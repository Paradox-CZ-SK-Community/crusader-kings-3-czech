 rationality_strong_explanation: "Tato postava je #Bold velmi racionální#! a výrazně častěji se vyhýbá [tyranny|E], využívá [councillor_tasks|E] ke své obraně a vyhýbá se [offensive_war_opinion|E]. Obecně mnohem častěji činí to, co je pro danou situaci objektivně nejlepší, například zavraždí [tyrannical|E] [liege|E], vymění [hostages|E], aby předešla válce, nebo omezí výdaje, když je v [debt|E]."
