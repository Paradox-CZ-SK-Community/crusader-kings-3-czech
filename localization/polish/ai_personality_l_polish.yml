 zeal_neg_explanation: "Tato postava je #Bold poněkud cynická#! a spíše přehlíží [faith|E] v politice, přijímá požadavky náboženských [factions|E] a používá víru jako nástroj k prosazení jiných zájmů. Sotva dbá o [piety|E] a méně často podporuje náboženské autority."
 zeal_strong_explanation: "Tato postava je #Bold velmi horlivá#! a výrazně častěji se obranně připojuje proti [holy_wars|E], skládá sliby či přispívá na [great_holy_wars|E], obrací [counties|E] či [vassals|E], podniká [pilgrimage|E] [activities|E] a činí kroky podporující její [faith|E] (například použitím $seek_indulgences_interaction$ [interaction|E]). K jiné víře konvertuje jen zcela výjimečně a spíše požaduje [hostages|E] od nepřátelských vyznání."
 zeal_strong_neg_explanation: "Tato postava je #Bold velmi cynická#! a výrazně více tíhne k přehlížení [faith|E] v politice, přijímá požadavky náboženských [factions|E] a používá víru jako nástroj k prosazení jiných zájmů. Sotva dbá o [piety|E] a téměř nikdy nepodporuje náboženské autority."
