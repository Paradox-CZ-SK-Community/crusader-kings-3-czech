 honor_strong_adj: "Spravedliv[Select_CString( CHARACTER.IsFemale, 'á', 'ý' )]"
 honor_strong_neg_noun: "[Select_CString( CHARACTER.IsFemale, 'Šejdířka', 'Šejdíř' )]"
 honor_strong_neg_adj: "Zrádn[Select_CString( CHARACTER.IsFemale, 'á', 'ý' )]"
 honor_explanation: "Tato postava je #Bold čestná#! a lze jí více než většině důvěřovat, že uchová [secrets|E], bude dodržovat [laws|E], plnit svou povinnost jako [regent|E] a ctít závazky, jako jsou [alliances|E], péče o [hostages|E] a jejich navracení. Je nepravděpodobné, že bude [blackmail|E], snovat [hostile_schemes|E] nebo působit jako [agents|E]."
 honor_neg_explanation: "Tato postava je #Bold poněkud nečestná#! a spíše začne [hostile_schemes|E], zneužije své postavení [regent|E], zadrží [hostages|E], použije [blackmail|E], využije úkol rady $task_find_secrets$ [councillor_task|E] a zradí své [friends|E] i [spouses|E]. Méně často dostojí svým závazkům a kvůli svým cílům se může snížit velmi nízko."
 honor_strong_explanation: "Tato postava je #Bold velmi čestná#! a lze jí bezpečně důvěřovat, že uchová [secrets|E], bude dodržovat [laws|E], plnit svou povinnost jako [regent|E] a ctít závazky, jako jsou [alliances|E], péče o [hostages|E] a jejich navracení. Je nepravděpodobné, že bude [blackmail|E], osnovat [hostile_schemes|E] nebo působit jako [agents|E]."
 honor_strong_neg_explanation: "Tato postava je #Bold velmi nečestná#! a výrazně častěji začne [hostile_schemes|E], zneužije své postavení [regent|E], použije [blackmail|E], využije úkol rady $task_find_secrets$ [councillor_task|E], zadrží [hostages|E] a zradí své [friends|E] i [spouses|E]. Mnohem méně často dostojí svým závazkům a kvůli svým cílům se může snížit neuvěřitelně nízko."
