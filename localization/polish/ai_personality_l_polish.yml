 greed_explanation: "Tato postava je #Bold poněkud chamtivá#! a spíše volí krátkodobé zisky, vyráží na [raids|E], zpronevěřuje [gold|E] jako [regent|E], využívá úkol rady $task_collect_taxes$ [councillor_task|E] a zrazuje své [friends|E] i [family|E] kvůli zlatu a [titles|E]. Méně ochotně platí výkupné za [prisoners|E], posílá [gifts|E], přijímá [revocations|E] a [retractions|E], nabízí či vrací [hostages|E] a přijímá [white_peace|E]."
 greed_neg_explanation: "Tato postava je #Bold poněkud štědrá#! a má sklon utrácet více, než si může dovolit, posílat [gifts|E], vykupovat [prisoners|E], přijímat [revocations|E] a [retractions|E] a pořádat [activities|E]. Méně snadno podléhá úplatkům či darům [gold|E] a ochotněji vyměňuje [hostages|E]."
 greed_strong_explanation: "Tato postava je #Bold velmi chamtivá#! a výrazně častěji volí krátkodobé zisky, vyráží na [raids|E], zpronevěřuje [gold|E] jako [regent|E], využívá úkol rady $task_collect_taxes$ [councillor_task|E] a zrazuje své [friends|E] i [family|E] kvůli zlatu a [titles|E]. Mnohem méně ochotně platí výkupné za [prisoners|E], posílá [gifts|E], přijímá [revocations|E] a [retractions|E], nabízí či vrací [hostages|E] a přijímá [white_peace|E]."
 greed_strong_neg_explanation: "Tato postava je #Bold velmi štědrá#! a velmi často utrácí více, než si může dovolit, posílá [gifts|E], vykupuje [prisoners|E], přijímá [revocations|E] a [retractions|E] a pořádá [activities|E]. Mnohem méně snadno podléhá úplatkům či darům [gold|E] a ochotněji vyměňuje [hostages|E]."
