 boldness_neg_explanation: "Tato postava je #Bold poněkud zbabělá#! a spíše vyhlašuje [war|E] slabším [rulers|E], bez boje ustupuje [factions|E], vyhýbá se roli [agent|E], zdráhá se [imprisoning|E] silné [vassals|E] nebo nabídne [hostage|E], aby předešla válce. [dread|E] na ni působí silněji a obecně se vyhýbá rizikům pro [health|E] či [realm|E]."
