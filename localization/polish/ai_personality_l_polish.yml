l_polish:
 AI_PERSONALITY_ADJECTIVE_NOUN: "$ADJECTIVE$ $NOUN$"
 AI_PERSONALITY_NEUTRAL: "Vyrovnan[Select_CString( CHARACTER.IsFemale, 'á', 'ý' )]"
 AI_PERSONALITY_NEUTRAL_EXPLANATION: "Tato postava má vyrovnanou osobnost a nebude jednat nijak zvlášť nápadným způsobem."
 AI_PERSONALITY_TOOLTIP: "#T Osobnost\n#!Osobnost postavy ovlivňuje rozhodnutí, která činí. Osobnost je určována především [traits|E].\n\nPostavy ovládané hráči nemají Osobnost, protože jejich chování řídí hráči."
 AI_PERSONALITY_IS_PLAYER_TOOLTIP: "#T Osobnost\n#!Tato postava je ovládána jiným hráčem."
 AI_ECONOMIC_ARCHETYPE_TT: "\n$EFFECT_LIST_BULLET$[economical_archetype|E]: [Character.Custom( 'AIEconomicPersonality' )]"
 AI_VASSAL_STANCE_TT: "\n$EFFECT_LIST_BULLET$[vassal_stance|E]: [Character.GetVassalStance.GetTextIcon][Character.GetVassalStance.GetName]"
 AI_PERSONALITY_CONCEPT_TT: "#weak [Character.GetShortUINameNoTooltip] se bude k vám i ostatním chovat podle své Osobnosti, která je určena především [Character.GetHerHis] [personality_traits|E]#!"
 AI_PERSONALITY_TT: "#T Přehled osobnosti:#!\n$EFFECT_LIST_BULLET$[character_personality|E]: [personality_i] [Character.GetAIPersonality][AddLocalizationIf( Character.IsRuler, 'AI_ECONOMIC_ARCHETYPE_TT' )][AddLocalizationIf( And( Not( Character.IsIndependentRuler ), Character.IsRuler ), 'AI_VASSAL_STANCE_TT' )]\n\n$AI_PERSONALITY_CONCEPT_TT$."
 honor_noun: "[Select_CString( CHARACTER.IsFemale, 'Dáma', 'Kavalír' )]"
