  bp1_yearly.2070.a: "Milý/á [bp1_yearly_2070_soulmate.GetFirstNameNoTooltip] - mohl(a) jsem strávit celý tento čas s #EMP tebou#!."
  bp1_yearly.2070.a_tt: "Objímáš [bp1_yearly_2070_soulmate.GetFirstNameNoTooltip]."
  bp1_yearly.2070.b: "To prostě nebyla vůle [ROOT.Char.GetFaith.HighGodNamePossessive]."
  bp1_yearly.2070.b_tt: "[bp1_yearly_2070_soulmate.GetFirstNameNoTooltip] v tom najde určité utěšení."
  bp1_yearly.2070.c: "Ty i já oba víme, že je to tak nejlepší."
  bp1_yearly.2070.desc: "Všiml jsem si, že [bp1_yearly_2070_soulmate.GetFirstName] byl(a) v poslední době sklíčený/á a odtažitý/á. Při naší tradiční procházce krajinou u hranic našeho domu seberu odvahu a konfrontuji [bp1_yearly_2070_soulmate.GetHerHim].\n\n"Takže sis toho všiml, co." [bp1_yearly_2070_soulmate.GetSheHe|U] kráčí pomaleji, nakonec se zastaví a kochá se výhledem. Sluneční paprsky se třpytí na [bp1_yearly_2070_soulmate.GetHerHis] kůži.\n\n"Miluji tě. A miluji náš společný život." Oči [bp1_yearly_2070_soulmate.GetHerHis|U] se zalijí mlhou. "Jedna ze mých největších lítostí je, že jsem ti nikdy nebyl/a schopen/na dopřát, nebo tedy nám, žádné dítě, které bychom po sobě zanechali pro tento svět."\n\nSlova [bp1_yearly_2070_soulmate.GetHerHis|U] mi zní v uších. Nést to břemeno sám/sama, můj sladký, silný [bp1_yearly_2070_soulmate.GetFirstName]!"
