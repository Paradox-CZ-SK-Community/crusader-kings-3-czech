l_polish:
  building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$" # todo: NEW TRANSLATION
  building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$" # todo: NEW TRANSLATION
  building_holy_site_st_peters_basilica_01: "Bazilika svatého Petra" # todo: NEW TRANSLATION
  building_holy_site_st_peters_basilica_01_desc: "Postavena na místě hrobu svatého Petra na Vatikánském vrchu na příkaz císaře Konstantina I. po jeho přechodu na křesťanství, bazilika svatého Petra slouží jako centrum křesťanstva na Západě. \n\nTento chrám tradičně slouží jako sídlo římskokatolického papeže a v průběhu staletí vyrostl v rozsáhlý komplex chráněný Leoninskou zdí." # todo: NEW TRANSLATION
  building_type_mont_st_michel_01: "Mont-Saint-Michel" # todo: NEW TRANSLATION
  building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$" # todo: NEW TRANSLATION
  building_mont_st_michel_01: "Aubertova oratoř zasvěcená archandělu Michaelovi" # todo: NEW TRANSLATION
  building_mont_st_michel_01_desc: "V roce 708 viděl svatý Aubert, biskup z Avranches, ve snu vizi archanděla Michaela, který mu přikázal postavit oratoř na nedalekém přílivovém ostrově. Aubert tuto vizi zpočátku ignoroval, přisuzujíce ji ďáblově lestě. Nakonec se mu archanděl podařilo přesvědčit ho — podle legendy mu prstem propíchl lebku — a biskup nařídil výstavbu nového svatostánku na Mont Tombe. \n\nTak začíná historie Mont-Saint-Michel." # todo: NEW TRANSLATION
  building_mont_st_michel_02: "The Romanesque Abbey of Mont-Saint-Michel" # todo: NEW TRANSLATION
  building_mont_st_michel_02_desc: "Nový kostel opatství stojí na nejvyšším bodě ostrova jako důkaz Boží moci nad nebem i zemí a lidské důmyslnosti. \n\nPod opatstvím pomalu roste malé městečko poutníků a rybářů." # todo: NEW TRANSLATION
  building_mont_st_michel_03: "The Merveille" # todo: NEW TRANSLATION
  building_mont_st_michel_03_desc: "Opatství bylo rozšířeno o řadu křížových chodeb, kaplánství, vinný sklep, rytířskou síň a mnoho ubytování, čímž vznikl gotický komplex, který lze popsat jen jako zázrak technického umu. \n\nOpatství má impozantní nové opevnění a sídliště pod ním je nyní pravé město, kde žije mnoho poutníků i místních obyvatel." # todo: NEW TRANSLATION
  building_mont_st_michel_04: "Fortified Monastery of Mont-Saint-Michel" # todo: NEW TRANSLATION
  building_mont_st_michel_04_desc: "Nedávné války ukázaly, že i ostrov klidu jako Mont-Saint-Michel může být strategicky důležitý. Proto byla skála důkladně opevněna mohutnými hradbami a bašty a pro posádku vzniklo několik nových ubytoven. \n\nPobřežní osada je nyní rušným městem, téměř celý ostrov je pokryt domy." # todo: NEW TRANSLATION
  building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$" # todo: NEW TRANSLATION
  building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$" # todo: NEW TRANSLATION
  building_sanchi_stupa_01: "Velká stupa v Sanchi" # todo: NEW TRANSLATION
  building_sanchi_stupa_01_desc: "Velkou stupu postavil maurjský císař Ašóka ve třetím století př. n. l. nedaleko místa, kde se oženil se svou manželkou Devi. Tento velkolepý objekt uchovávající relikvie Buddhy je jedním z nejstarších svého druhu a je také proslulý svými složitě vyřezávanými vraty typu torana." # todo: NEW TRANSLATION
  building_type_boudhanath_01: "$building_boudhanath_01$" # todo: NEW TRANSLATION
  building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$" # todo: NEW TRANSLATION
  building_boudhanath_01: "Boudhanath" # todo: NEW TRANSLATION
  building_boudhanath_01_desc: "Boudha Stupa v Káthmándú, také známá jako Jarung Kashor a Khāsa Chaitya, je jednou z největších stup buddhismu a možná místem zrodu toho, co se stalo tibetskou větví buddhismu. Její obrovský dóm a mandala ukrývají ostatky mnoha buddhů a nespočet posvátných relikvií nejrůznějších tvarů a podob. \n\nDíky své poloze na staré obchodní stezce mezi Nepálem a Tibetem sem často zavítají cestovatelé a obchodníci, aby si odpočinuli a pomodlili se." # todo: NEW TRANSLATION
  building_type_yazd_mosque_01: "$building_yazd_mosque_01$" # todo: NEW TRANSLATION
  building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$" # todo: NEW TRANSLATION
  building_yazd_mosque_01: "Velká mešita v Yazdu" # todo: NEW TRANSLATION
  building_yazd_mosque_01_desc: "Postavěná na místě čtvrtého století ohnivého chrámu, tato slavná budova ohromuje poutníky i cestovatele svými velkými iwánami, kachlovou kupolí a impozantním vstupním portálem se dvojicí nebesky vysokých minaretů." # todo: NEW TRANSLATION
  building_type_qutb_minar_01: "$building_qutb_minar_01$" # todo: NEW TRANSLATION
  building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$" # todo: NEW TRANSLATION
  building_qutb_minar_01: "Železný sloup v Dillí" # todo: NEW TRANSLATION
  building_qutb_minar_01_desc: "Mocný železný sloup v Dillí stojí jako symbol slávy krále Chandragupty II., přesto i následní panovníci do něj vryli svá jména. I přes dlouhou dobu, po kterou stojí, na něm není žádná známka rzi – důkaz dovednosti indických kovářů železa!" # todo: NEW TRANSLATION
  building_qutb_minar_02: "Qutb Minar" # todo: NEW TRANSLATION
  building_qutb_minar_02_desc: "Quwwat-ul-Islam, velká mešita obklopující staré místo, kde stál Železný sloup v Dillí, korunovaná skutečně obrovským minaretem zvaným Qutb Minar. \n\nVelkolepý monument na sílu panovníků Dillí." # todo: NEW TRANSLATION
  building_qutb_minar_03: "Rozšířená mešita Quwwat-ul-Islam" # todo: NEW TRANSLATION
  building_qutb_minar_03_desc: "Komplex kolem Qutb Minaru byl rozšířen o několik dalších nádvoří, vstupních bran a mauzoleí, dosahujících legendárních rozměrů." # todo: NEW TRANSLATION
  building_qutb_minar_04: "Alai Minar" # todo: NEW TRANSLATION
  building_qutb_minar_04_desc: "Komplexu byl přidán druhý minaret navržený podle Qutb Minaru, ale dvojnásobných rozměrů. Tento kolos, který se tyčí nad Dillí, je vrcholem indo-islámské architektury." # todo: NEW TRANSLATION
