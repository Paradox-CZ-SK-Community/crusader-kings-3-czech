l_polish:
  building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$" # todo: NEW TRANSLATION
  building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$" # todo: NEW TRANSLATION
  building_goguryeo_tomb_01: "Hrobka goguryejského krále" # todo: NEW TRANSLATION
  building_goguryeo_tomb_01_desc: "Tato velká obdélná hrobka z opracovaného kamene prý patří starověkému goguryejskému králi, jehož jméno se však nyní ztratilo. Chodby vedoucí k hrobce jsou malované barevnými freskami a na vrcholu pyramidy se tyčí malý dřevěný pavilon na počest pohřbeného." # todo: NEW TRANSLATION
  building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$" # todo: NEW TRANSLATION
  building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$" # todo: NEW TRANSLATION
  building_buddha_kamakura_01: "Velký Buddha v Kamakuře" # todo: NEW TRANSLATION
  building_buddha_kamakura_01_desc: "Kamakurský #italic Daibutsu#! je uctívaná bronzová socha Amitábhy, vážící několik tun a zdobená pozlacenými detaily. Socha je ukryta ve velké síni inspirované chrámy jihozápadu a obklopena třiceti dvěma okvětními plátky lotosu." # todo: NEW TRANSLATION
  building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$" # todo: NEW TRANSLATION
  building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$" # todo: NEW TRANSLATION
  building_pyramid_lingapura_01: "Pyramida Lingapura" # todo: NEW TRANSLATION
  building_pyramid_lingapura_01_desc: "Tato velká stupňovitá pyramida se zvedá z džungle jako posvátná hora, každá ze sedmi teras obsahuje stále zdobnější svatyně a oltáře. Horní svatyně korunuje stavbu a uvnitř chrání posvátný #italic lingam#! Šivy, střed složitého osového náboženského uspořádání." # todo: NEW TRANSLATION
  building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$" # todo: NEW TRANSLATION
  building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$" # todo: NEW TRANSLATION
  building_maijishan_grottoes_01: "Maijishanské jeskyně" # todo: NEW TRANSLATION
  building_maijishan_grottoes_01_desc: "Hora Maijishan byla dlouho místem úcty a podél jejích jižních útesů, považovaných za geomanticky příznivé, bylo do červenavé skály vytesáno stovky svatyní, které ukrývají sochy a barevné fresky pokojných buddhů a bodhisattvů. Mnohé z nich byly objednány místními městskými rodinami, pro které je toto místo příležitostným poutním místem a místem meditativního rozjímání." # todo: NEW TRANSLATION
  building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$" # todo: NEW TRANSLATION
  building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$" # todo: NEW TRANSLATION
  building_three_pagodas_dali_01: "Tři pagody v Dali" # todo: NEW TRANSLATION
  building_three_pagodas_dali_01_desc: "Ze rozlehlého chrámového komplexu vládnoucí rodiny města se zvedají tři vysoké pagody z cihlových zdí a kamenných podstavců. Jsou vrcholy rovnoramenného trojúhelníku, vymezují posvátnou geometrii místa a rámují okolní hory a jezero." # todo: NEW TRANSLATION
  building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$" # todo: NEW TRANSLATION
  building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$" # todo: NEW TRANSLATION
  building_iron_lion_cangzhou_01: "Železný lev z Cangzhou" # todo: NEW TRANSLATION
  building_iron_lion_cangzhou_01_desc: "Monumentální lev je největší litinová socha v celé Číně a na svém silném hřbetě nese bodhisattvu sedícího na lotosovém podstavci, bohatě zdobeného pozlacenými detaily. Umístěný poblíž povodňové nížiny se mezi místními stal známým jako strážce proti stoupajícím přílivům." # todo: NEW TRANSLATION
  building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$" # todo: NEW TRANSLATION
  building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$" # todo: NEW TRANSLATION
  building_dengfeng_observatory_01: "Observatoř Gaocheng" # todo: NEW TRANSLATION
  building_dengfeng_observatory_01_desc: "Toto místo bylo po staletí oblíbené k astronomickým pozorováním díky svým geomantickým vlastnostem a symbolické geografické centralitě v rámci Číny. Současná stavba složitého lichoběžníkového tvaru slouží jako obrovské sluneční hodiny, přičemž vysoký centrální prut vrhá svůj stín do rýhy, která dělí plošinu, a značí průchod slunce." # todo: NEW TRANSLATION
  building_type_muara_takus_01: "$building_muara_takus_01$" # todo: NEW TRANSLATION
  building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$" # todo: NEW TRANSLATION
  building_muara_takus_01: "Candi Muara Takus" # todo: NEW TRANSLATION
  building_muara_takus_01_desc: "Komplex chrámu tvoří mnoho staveb, všechny postavené z cihel a zdobené pískovcovými detaily. Ve středu se tyčí velké stupy #italic Mahligai#! a #italic Tuo#!, první vysoký a štíhlý, druhý obrovský jako hora, převyšující menší svatyně a terasy kolem nich." # todo: NEW TRANSLATION
  building_type_stone_pagoda_01: "$building_stone_pagoda_01$" # todo: NEW TRANSLATION
  building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$" # todo: NEW TRANSLATION
  building_stone_pagoda_01: "Kamenná pagoda Mireuksa" # todo: NEW TRANSLATION
  building_stone_pagoda_01_desc: "Devítipatrová pagoda stojící na širokém kamenném podstavci, její světlá kamenná konstrukce se leskne pod sluneční oblohou. Je to první z kamenných pagod v Koreji a její tvar a vyvážené proporce se staly vzorem pro stavitele chrámů po celé poloostrově." # todo: NEW TRANSLATION
  building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$" # todo: NEW TRANSLATION
  building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$" # todo: NEW TRANSLATION
  building_thuriang_kilns_01: "Thuriangovy pece" # todo: NEW TRANSLATION
  building_thuriang_kilns_01_desc: "Na místě se nachází více než dvě stě velkých pecí, největší centrum výroby celadonů v regionu. Keramika vypálená zde je známá svou hrubou, na vysokou teplotu vypálenou strukturou a charakteristickou žlutozelenou glazurou a obchoduje se na trzích po celém jihovýchodním Asii." # todo: NEW TRANSLATION
  building_type_yuelu_academy_01: "$building_yuelu_academy_01$" # todo: NEW TRANSLATION
  building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$" # todo: NEW TRANSLATION
  building_yuelu_academy_01: "Akademie Yuelu" # todo: NEW TRANSLATION
  building_yuelu_academy_01_desc: "Jedna z nejprestižnějších akademií vzdělání v Číně, Yuelu dlouho sloužila jako centrum studia a zkoušek. Její půdorys je soustředěn kolem hlavního nádvoří, od kterého se rozbíhají vedlejší síně a pavilony, kde se generace učenců připravovaly na státní službu, a rozkládají se do vyvážené symetrie." # todo: NEW TRANSLATION
  building_type_chocolate_hills_01: "$building_chocolate_hills_01$" # todo: NEW TRANSLATION
  building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$" # todo: NEW TRANSLATION
  building_chocolate_hills_01: "Rezavé svahy" # todo: NEW TRANSLATION
  building_chocolate_hills_01_desc: "Tato geologická formace je charakterizována velkým množstvím zaoblených, kuželovitých kopců, které se rovnoměrně rozprostírají po krajině. Jsou pokryty vrstvou trávy, která se během suchého období zbarví do výrazných hnědých a oranžových odstínů, což dává terénu neobvyklý podzimní nádech." # todo: NEW TRANSLATION
  building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$" # todo: NEW TRANSLATION
  building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$" # todo: NEW TRANSLATION
  building_fanfang_guangzhou_01: "Fanfang v Guangzhou" # todo: NEW TRANSLATION
  building_fanfang_guangzhou_01_desc: "The #italic Fanfang#! je důležitá komunita zahraničních obchodníků – především muslimských Arabů a Peršanů, kteří sem přišli po námořních obchodních trasách – které byla přidělena vlastní čtvrť na západě města s vlastními úředníky a zvyklostmi. V jejím centru stojí červeně omítnutá mešita korunovaná vysokou minaretou a majákem, který navádí lodě i duše k bezpečí přístavu." # todo: NEW TRANSLATION
  building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$" # todo: NEW TRANSLATION
  building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$" # todo: NEW TRANSLATION
  building_wilwatikta_palace_01: "Palác Wilwatikta" # todo: NEW TRANSLATION
  building_wilwatikta_palace_01_desc: "Rozlehlý palácový komplex pavilonů, síní, chrámů a nádvoří, Wilwatikta je dost rozsáhlá na to, aby připomínala vlastní město. Obdélníkové cihlové zdi obklopují areál a vstup do procesní aleje je označen řadou vysokých #italic Paduraksa#! bran." # todo: NEW TRANSLATION
  building_type_ha_long_bay_01: "$building_ha_long_bay_01$" # todo: NEW TRANSLATION
  building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$" # todo: NEW TRANSLATION
  building_ha_long_bay_01: "Zátoka Ha Long" # todo: NEW TRANSLATION
  building_ha_long_bay_01_desc: "Tato ohromující krajina krasových vápencových ostrůvků se zvedá z klidných smaragdových vod zálivu, kde místní rybáři plují a hledají úlovek ve stínu těchto pilířů." # todo: NEW TRANSLATION
  building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$" # todo: NEW TRANSLATION
  building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$" # todo: NEW TRANSLATION
  building_my_son_sanctuary_01: "Svatyně My Son" # todo: NEW TRANSLATION
  building_my_son_sanctuary_01_desc: "Největší a nejdokonalejší z chamských chrámových komplexů, svatyně se skládá ze série ohrad roztroušených blízko u sebe v zalesněné krajině, každá se svými vraty, svatyněmi a stupami. Stavby jsou postaveny z červených cihel, uspořádaných do geometrických vzorů a zdobených pískovcovými překlady." # todo: NEW TRANSLATION
  building_type_gunung_api_01: "$building_gunung_api_01$" # todo: NEW TRANSLATION
  building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$" # todo: NEW TRANSLATION
  building_gunung_api_01: "Gunung Api" # todo: NEW TRANSLATION
  building_gunung_api_01_desc: "Tato hora, která vyčnívá z džungle, je pro místní lidi posvátná. Uprostřed vlhkosti a mlhy jsou její svahy pokryty nápadnými vápencovými věžemi a hlubokými jeskyněmi vytesanými vodou během nesčetných věků." # todo: NEW TRANSLATION
  building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$" # todo: NEW TRANSLATION
  building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$" # todo: NEW TRANSLATION
  building_suwalesi_megaliths_01: "Sulaweské megality" # todo: NEW TRANSLATION
  building_suwalesi_megaliths_01_desc: "Roztroušeny v údolích středního Sulawesi leží mnohé megalitické postavy a ikony postavené místními lidmi pro rituály a uctívání duchů. Tyto figuríny, známé jako #italic arcas#!, jsou vyřezány s minimalistickou precizností, jejich tvary jsou vyznačeny jemnými a elegantními liniemi." # todo: NEW TRANSLATION
  building_type_izumo_taisha_01: "$building_izumo_taisha_01$" # todo: NEW TRANSLATION
  building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$" # todo: NEW TRANSLATION
  building_izumo_taisha_01: "Kizuki Taisha" # todo: NEW TRANSLATION
  building_izumo_taisha_01_desc: "Tento velký šintoistický svatostánek - #italic taisha#! - byl postaven blízko pobřeží, čelem k moři. Vztyčuje se na řadě obrovských dřevěných pilířů a tlustých kmenů, zvedá své síně vysoko nad zem, kde chodí smrtelníci, a do nebe, kde sídlí bohové a duchové krajiny." # todo: NEW TRANSLATION
  building_type_confucius_temple_01: "$building_confucius_temple_01$" # todo: NEW TRANSLATION
  building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$" # todo: NEW TRANSLATION
  building_confucius_temple_01: "Chrám Konfucia" # todo: NEW TRANSLATION
  building_confucius_temple_01_desc: "Nejstarší a nejvlivnější ze všech konfuciánských chrámů, tento rozsáhlý komplex síní a nádvoří byl vzorem a inspirací pro stavitele chrámů po celé Číně i dál díky své harmonické geometrické dispozici a jemným detailům. Nedaleko se rozkládá tichý les, kde jsou uloženy hroby Konfucia a jeho potomků, tvoříc důležité poutní místo pro jeho stoupence." # todo: NEW TRANSLATION
  building_type_citadel_linan_01: "$building_citadel_linan_01$" # todo: NEW TRANSLATION
  building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$" # todo: NEW TRANSLATION
  building_citadel_linan_01: "Císařská citadela Lin'an" # todo: NEW TRANSLATION
  building_citadel_linan_01_desc: "Postavená podél severních svahů Fénixí hory slouží císařská citadela jako sídlo dvora a jeho správy, hostí nespočet učenců a úředníků ve svých rozlehlých síních a chodbách. Ačkoli není tak rozlehlá jako paláce severních hlavních měst, jemnost a elegance jejích terasovitých zahrad a pavilonů jim více než vyrovná." # todo: NEW TRANSLATION
  building_type_temples_angkor_01: "$building_temples_angkor_01$" # todo: NEW TRANSLATION
  building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$" # todo: NEW TRANSLATION
  building_temples_angkor_01: "Chrámy Angkoru" # todo: NEW TRANSLATION
  building_temples_angkor_01_desc: "V prosperujícím městě Indra jsou pozlacené střechy a věžičky jeho chrámů nespočtem, každý bohatěji zdobený než ten druhý sochařskými reliéfy a sochami božstev a devarajas." # todo: NEW TRANSLATION
  building_temples_angkor_02: "Angkor Wat" # todo: NEW TRANSLATION
  building_temples_angkor_02_desc: "Angkor Wat je masivní chrámový komplex zasvěcený božstvu Višnu. Je navržen tak, aby představoval horu Meru, domov bohů v hinduistické mytologii. Komplex je obklopen impozantním příkopem a má několik galerií chrámů, přetékajících náboženským uměním, sochami a reliéfy." # todo: NEW TRANSLATION
