  tgp_east_asia_interaction_events.2000.t: "Kořen, stonek a větev" # todo: NEW TRANSLATION
  tgp_east_asia_interaction_events.2000.desc: "Je mou nebeskou povinností podporovat dobro a ničit zlo; a z onoho druhého je v mém dosahu jen málo zdrojů zkaženosti větších než [recipient.GetTitledFirstName]! [recipient.GetHerHis|U] zločiny #EMP hanobí#! [recipient.GetHerHis] rodovou linii, a pro viníky nemůže být milost; vykořenění tohoto zla musí zasáhnout hluboko až ke kořenům.\n\nTi, kdo se postaví naší vůli, budou třást při [recipient.GetHerHis] zničení; ať [recipient.GetHerHis] hlava bude oddělena od [recipient.GetHerHis] těla a ponechána hnít na tržišti, [recipient.GetHerHis] kosti nepochovány a [recipient.GetHerHis] duch neklidný, a každý, kdo sdílí [recipient.GetHerHis] jedovatou krev, bude popraven nebo vyhnán do čtyř koutů světa." # todo: NEW TRANSLATION
  tgp_east_asia_interaction_events.2000.a: "Mou vůlí i mým právem, #EMP ukončím #bold [recipient.GetHerHis] jméno#!." # todo: NEW TRANSLATION
  tgp_east_asia_interaction_events.2000.a.title: "Kolektivní trest" # todo: NEW TRANSLATION
