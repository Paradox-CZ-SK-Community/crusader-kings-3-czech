l_polish:
  tgp_tai_migration_event.1000.t: "Útěk Tai" # todo: NEW TRANSLATION
  tgp_tai_migration_event.1000.desc: "Během dnešního zasedání rady jsem byl informován o masové migraci osadníků Tai. [migration_leader.GetName], starší zástupce jejich společenství, nyní stojí přede mnou, zatímco [migration_leader.GetSheHe] pokorně předkládá [migration_leader.GetHerHis] případ.\n\n"Moje [ROOT.Char.GetTitleAsNameNoTooltip], hledáme vedení a nový domov jako bývalí poddaní [migration_origin_holder.GetName]. Mluvím za mnoho klanů a tisíce lidí, kteří hledají útočiště. Chraňte nás před nebezpečím a dejte nám účel, abychom mohli být užitečnými služebníky hodnými vaší štědrosti.""\n\nJejich osud stojí na mých rtech." # todo: NEW TRANSLATION
  tgp_tai_migration_event.1000.a: "Vítám vás všechny, ne jako hosty, ale jako své poddané." # todo: NEW TRANSLATION
  tgp_tai_migration_event.1000.b: "Pouze zruční z vás budou sídlit v mém [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]." # todo: NEW TRANSLATION
  tgp_tai_migration_event.1000.c: "Více lidí znamená více problémů; běžte žádat jinde." # todo: NEW TRANSLATION
  tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "Imigranti mohou v blízké budoucnosti žádat o přístřeší u jiného sousedního vládce." # todo: NEW TRANSLATION
  tgp_tai_migration_skilled_development_county_modifier: "Útěk řemeslníků" # todo: NEW TRANSLATION
  tgp_tai_migration_migration_happened_county_modifier: "Tai osadníci" # todo: NEW TRANSLATION
  tgp_tai_migration_migration_happened_character_modifier: "Přijal nespočet migrantů" # todo: NEW TRANSLATION
  tgp_tai_migration_migration_rejected_character_modifier: "Odmítl migranty" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.t: "Talentovaný Tai" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.desc: "Před mnou stojí zručný [migrant_skilled_character.GetWomanMan], který tvrdí, že pochází ze zemí [migrant_skilled_character.GetCulture.GetNameNoTooltip], coby zkušený uchazeč o místo. [migrant_skilled_character.GetHerHis|U] chování se zdá odrážet nedávné zprávy o útěku jejich lidu.\n\n" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.wet_nurse.desc: ""Vaše Veličenstvo, jsem [migrant_skilled_character.GetName], zkušená osoba připravená pečovat a sloužit. Jsem zdravý/á, dobře živený/á a rozumím potřebám kojenců. Dovolte mi pomoci vašemu rodu vzkvétat."" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.champion.desc: ""Mocný pane, ve své vlasti mě znají jako [migrant_skilled_character.GetName], přísahou vázaný bojovník a vítěz mnoha turnajů. Má ruka je pevná a věrnost nezpochybnitelná. Nechte mě být vaším šampionem."" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.travel_leader.desc: ""Má [ROOT.Char.GetTitleAsNameNoTooltip], jsem [migrant_skilled_character.GetName], putoval jsem přes pouště, hvězdy jsou mou mapou a vítr mým spojencem. Pod mým vedením žádná karavana nezabloudí a žádná stezka není obtížná."" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.master_of_hunt.desc: ""Narodil jsem se pro hon, vytříben divočinou; znám pach každého tvora a ticho každého lesa. Čtu kopytní stopy jako nikdo jiný. Co říkáte, má [ROOT.Char.GetTitleAsNameNoTooltip]?"" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.court_physician.desc: ""Masti z dávných rukopisů a obratné ruce pod tlakem — jsem ten/ta, kterého potřebujete, aby vaše nebeské tělo bylo zdrávo, má [ROOT.Char.GetTitleAsNameNoTooltip]. Říkají mi [migrant_skilled_character.GetName]."" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.antiquarian.desc: ""Mé oči viděly mýty a mé ruce se dotýkaly starobylých říší. Pusťte mě do svých služeb, aby moudrost dávných mohla dosáhnout vašeho dvora."" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.court_tutor.desc: ""Ovlivnil jsem mnoho bojovníků a státníků, má [ROOT.Char.GetTitleAsNameNoTooltip]. I vaše potomstvo dosáhne velikosti pod mým vedením, pokud to dovolíte."" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.end.desc: "\n\n[migrant_skilled_character.GetSheHe|U] vypadá zoufale kvůli přístřeší, pravděpodobně z důvodů, které [migrant_skilled_character.GetHerHim] přivedly sem, ale očividně dobře ovládá své řemeslo. Mám využít [migrant_skilled_character.GetHerHis] dovedností?" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.a: "Možná budu potřebovat vaše služby." # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.b: "Zatím ne, ale měli byste u nás zůstat." # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.b.success: "[migrant_skilled_character.GetNameNoTooltip] se připojuje k vašemu dvoru" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.b.failure: "[migrant_skilled_character.GetNameNoTooltip] odmítá vaši nabídku" # todo: NEW TRANSLATION
  tgp_tai_migration_event.2000.c: "Musím odmítnout." # todo: NEW TRANSLATION
  tgp_tai_migration_event.3000.t: "Nabídka hlavy rodiny" # todo: NEW TRANSLATION
  tgp_tai_migration_event.3000.desc: "Poctivý cizinec přistupuje k mým síním s výraznou jistotou, aby učinil administrativní nabídku.\n\nPo překvapivě upřímném pozdravu, na rozdíl od typického venkovského tónu, a podrobném příběhu o žalostné cestě jeho rodiny do mých zemí, dospěje k odvážnému závěru.\n\n\"...rozbořeni lupiči a řádění, pravím vám, má [ROOT.Char.GetTitleAsNameNoTooltip]. Z toho, co mi zbylo z oloupeného majetku, mám dokázané dovednosti, bystré vnímání pro dohled, věrnost a rodinu, která potřebuje vaši pomoc. Já i moje krev budeme vašimi služebníky, dokud nás neoznačíte za nehodné.\"" # todo: NEW TRANSLATION
  tgp_tai_migration_event.3000.a: "Vaše přání je vyhověno, pokud zůstanete věrní." # todo: NEW TRANSLATION
  tgp_tai_migration_event.3000.b: "To mi nepřipadá jako spravedlivá výměna." # todo: NEW TRANSLATION
  tgp_tai_migration_event.4000.t: "Rodina Tai" # todo: NEW TRANSLATION
  tgp_tai_migration_event.4000.desc: "Moji strážci přivádějí do síně ubohou rodinu cizinců ze severních zemí.\n\nPo dlouhém žebrání se hlava rodiny zadívá do mé duše a nabízí vše, co nemá, aby mi vytřel podlahy paláce výměnou za přístřeší pod mými mocnými křídly. Podle jeho příběhu se zdá, že mnoho jeho lidu se stahuje do našich zemí v naději na nové ochránce." # todo: NEW TRANSLATION
  tgp_tai_migration_event.4000.a: "Poskytnu vám útočiště v těchto těžkých časech." # todo: NEW TRANSLATION
  tgp_tai_migration_event.4000.b: "Můj dvůr nemá pro vaši rodinu místo." # todo: NEW TRANSLATION
