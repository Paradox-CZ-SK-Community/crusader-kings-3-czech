l_polish:
  tgp_travel_danger_events.0001.t: "Život v troskách" # todo: NEW TRANSLATION
  tgp_travel_danger_events.0001.intro: "Cestou přes [ROOT.Char.GetCurrentLocation.GetName] vidím všude stopy [disaster_situation.GetType.GetNameNoTooltip|l]." # todo: NEW TRANSLATION
  tgp_travel_danger_events.0001.flood: "Na březích řeky leží trosky, domy plují po proudu jako listy na potoce. Celá vesnice byla pohlcena divokým proudem." # todo: NEW TRANSLATION
  tgp_travel_danger_events.0001.earthquake: "Kdysi úrodná země a živá vesnice leží tichá v zmatku a sutinách, pohlcena samotnou zemí." # todo: NEW TRANSLATION
  tgp_travel_danger_events.0001.desc: "\n\nJakmile dorazíme na okraj zničeného městečka, spatřím osamělé dítě v sutinách. [peasant_character_child.GetSheHe|U] si mě nevšímá, protože [peasant_character_child.GetSheHe] zoufale snaží opravit to, co vypadalo, že kdysi bývala usedlost." # todo: NEW TRANSLATION
  tgp_travel_danger_events.0001.a: "Moji muži odstraní sutiny." # todo: NEW TRANSLATION
  tgp_travel_danger_events.0001.b: "Vezmu si [peasant_character_child.GetHerHim] pod svá křídla." # todo: NEW TRANSLATION
  tgp_travel_danger_events.0001.c: "Na tohle nemám čas!" # todo: NEW TRANSLATION
  impressed_by_kindness: "Ohromen laskavostí" # todo: NEW TRANSLATION
