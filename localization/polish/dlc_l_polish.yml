 dlc_001: "$DLC001_PREORDER$"
 dlc_001_desc: "Ponořte se do Svaté říše římské se sbírkou oděvů pro prostý lid, válečníky i vládce střední Evropy."
 dlc_002: "$DLC002_SP_DAY1$"
 dlc_002_desc: "Dodejte svému dvoru oslnivý nový vzhled díky sadě oděvů a kosmetických prvků pro Blízký východ a severní Afriku."
 dlc_003: "$DLC003_FP1$"
 dlc_003_desc: "Zuřiví nájezdníci z mrazivého severu, nebo složitá společnost odvážných objevitelů, obchodníků a básníků? Objevte skutečné bohatství severského světa v Crusader Kings III: $DLC003_FP1$, prvním rozsáhlém balíčku obsahu pro kritikou oceňované Crusader Kings III."
 dlc_004: "$DLC004_EP1$"
 dlc_004_desc: "Rozšíření $DLC004_EP1$ pro Crusader Kings III přináší nové způsoby interakce s postavami ve vašem království či říši, stejně jako zásadní změny kulturního systému hry, které přidávají větší dynamičnost a historickou proměnlivost."
 dlc_005: "$DLC005_FP2$"
 dlc_005_desc: "Sluncem zalité země Pyrenejského poloostrova čekají na vaši slavnou vládu v balíčku Crusader Kings III: $DLC005_FP2$. Bohaté na historii, kulturu i lid, středověký osud poloostrova čeká, až jej utvoří vaše ruka — ať už v sametu smíru, či železnou pěstí."
 dlc_006: "$DLC006_BP1$"
 dlc_006_desc: "Mějte se na pozoru, vládce — zacházejte opatrně s těmi, které nazýváte přáteli či nepřáteli; jsou to dvě strany téže mince. Vaše vztahy mají větší význam než kdy dříve a v Crusader Kings III: $DLC006_BP1$ ožijí vaši nejbližší v dosud nevídaných detailech."
 dlc_007: "$DLC007_EP2$"
 dlc_007_desc: "Přepište dějiny, když se vydáte na cestu nebezpečnými středověkými kraji a okusíte slávu z pořádání i účasti na velkolepých turnajích, svatbách a cestách."
 dlc_008: "$DLC008_SP2$"
 dlc_008_desc: "Odějte své vládce do nejvybranějších šatů v tomto balíčku. Inspirován oděvy císaře Jindřicha II. a císařovny Kunhuty obsahuje nejen nové róby a šaty, ale i historicky věrné koruny a další doplňky. Dostupné výhradně pro majitele Kapitoly II."
 dlc_009: "$DLC009_BP2$"
 dlc_009_desc: "V rozšíření $DLC009_BP2$ stojí v popředí dětští vládci a jejich poručníci. Vychovávejte mladé prince a šlechtice ve světě, kde věčná sláva je na dosah jediné bitvy a nebezpečí číhá v každém stínu."
 dlc_010: "$DLC010_FP3$"
 dlc_010_desc: "Sásánovská říše je dávno pryč a Abbásovský chalífát tlačí zbývající íránské dynastie k podrobení. Podřídíte se, nebo vytvoříte novou říši? Budoucnost Persie je ve vašich rukou!"
 dlc_011: "$DLC011_CE1$"
 dlc_011_desc: "Zvěsti o vašich činech se šíří široko daleko: zapište se do análů dějin a budujte památky vlastní slávy! Tkejte bohatou tapisérii své legendy a tvořte příběhy, které se o vás budou zpívat po generace."
 dlc_012: "$DLC012_CP1$"
 dlc_012_desc: "Tento balíček oděvů pro severoafrické kultury přináší nové části oděvu pro postavy, včetně svršků, kalhot, plášťů, pokrývek hlavy a dalších prvků s novými vzory a motivy. „$DLC012_CP1$“ jsou prvním balíčkem vytvořeným ve spolupráci s komunitním tvůrcem."
 dlc_013: "$DLC013_SP3$"
 dlc_013_desc: "Inspirován módou francouzského dvora vrcholného středověku přináší tento kosmetický balíček nové styly a vzory do Crusader Kings III. Ozdobte se novými plášti, pokrývkami hlavy, styly vousů a účesů — vše pro sladění s vaším luxusním a královským oděvem. Dostupné výhradně pro majitele Kapitoly III."
 dlc_014: "$DLC014_EP3$"
 dlc_014_desc: "Veďte urozený rod ve starobylé říši a využívejte vliv i intriky k upevnění svého postavení, nebo se staňte potulným žoldnéřem a budujte si pověst vyjednavače či psance. Nové události, vládní systémy, intriky a životní styly vás čekají v rozšíření $DLC014_EP3$."
 dlc_015: "$DLC015_BP3$"
 dlc_015_desc: "Přináší nový obsah pro několik oblíbených systémů: cestování, aktivity a životní styly. Vysílejte svého vládce na napínavé výpravy za bohatstvím, prestiží či osobním růstem. Nenechte jej zahálet — dobrodružství čeká na každém kroku!"
 dlc_016: "$DLC016_CP2$"
 dlc_016_desc: "Tento Balíček tvůrce obsahu je inspirován západoslovanskými oděvy středověku. Obsahuje nové šaty, nohavice, honosné pokrývky hlavy a širokou škálu vzorů."
 dlc_017: "$DLC017_CP3$"
 dlc_017_desc: "Objevte velkolepé architektonické výtvory středověku s balíčkem $DLC017_CP3$.\n\nVytvořeno ve spolupráci s uznávaným modderem PiGu, přináší 20 nových rozmanitých a kulturně významných památek do hry."
 dlc_018: "$DLC018_CP4$"
 dlc_018_desc: "Čelte chladu dalekého severu stylově s balíčkem $DLC018_CP4$, vytvořeným ve spolupráci s modderem Aj. Přináší kosmetické prvky inspirované estetikou Sámů a Chantů."
 dlc_019: "$DLC019_SP4$"
 dlc_019_desc: "Dodejte své vládě královský lesk s balíčkem $DLC019_SP4$ — kolekcí kosmetických prvků pro vylepšení vzhledu vašich vládců. Dostupné výhradně pro majitele Kapitoly IV."
 dlc_020: "$DLC020_CE2$"
 dlc_020_desc: "Vládni, nebo buď ovládán. Migruj, nebo zahyneš. V rozšíření $DLC020_CE2$ přežijí jen ti nejsilnější v drsných podmínkách stepi. Dosáhnete velikosti a vybudujete říši dobyvatelů, nebo váš lid zmizí v dějinách? Volba je na vás."
 DLC021_BP4: "Korunovace"
 dlc_021: "$DLC021_BP4$"
 dlc_021_desc: "Začněte svou vládu velkolepě! Upevněte svou moc skrze okázalé obřady, které si získají respekt vazalů i rivalů. Od prvního doteku koruny se váš odkaz rodí ve velkoleposti Korunovací."
 DLC022_EP4: "Všechno pod Nebesy"
 dlc_022: "$DLC022_EP4$"
 dlc_022_desc: "S rozšířením $DLC022_EP4$ ožívá rozsáhlá a dynamická historie východní Asie. Získejte nebeský mandát, sjednoťte svůj lid a utvářejte budoucnost říší v tomto monumentálním rozšíření!"
 subscription_available: "Předplatné k dispozici"
 subscription_active: "Aktivní předplatné"
 DLC023_CP5: "Bojové oděvy vrcholného středověku"
 DLC024_CP6: "Svaté stavby"
 DLC025_CP7: "Oděvy severního Tichomoří"
 DLC026_CP8: "Divy Východní Asie"
 DLC027_CP9: "Oděvy nebeského dvora"
 DLC028_SP5: "Symboly moci"
 DLC029_MP1: "Písně říše"
 dlc_023: "$DLC023_CP5$"
 dlc_023_desc: "Vyzbrojte se do boje novou výstrojí s balíčkem $DLC023_CP5$. Tento balíček od moddera JedNick přináší širokou škálu západoevropských přileb, pokrývek hlavy a zbrojí z vrcholného středověku."
 dlc_024: "$DLC024_CP6$"
 dlc_024_desc: "Přidejte své mapě větší rozmanitost a historickou věrnost s balíčkem $DLC024_CP6$. Tento balíček od moddera Kefir úr přináší nové 3D modely náboženských staveb — od skromných kostelů po velkolepé památky."
 dlc_025: "$DLC025_CP7$"
 dlc_025_desc: "Objevte jedinečné oděvy, zbroje a sídla severního Tichomoří, inspirované kulturami Ainů, Nivchů a Emišiů."
 dlc_026: "$DLC026_CP8$"
 dlc_026_desc: "Obohaťte mapu světa monumentálními stavbami a posvátnými místy inspirovanými architektonickými divy východní Asie."
 dlc_027: "$DLC027_CP9$"
 dlc_027_desc: "Ozdobte své vládce vytříbenými oděvy a ceremoniálním šatem inspirovaným nádherou císařských dvorů."
 dlc_028: "$DLC028_SP5$"
 dlc_028_desc: "Balíček $DLC028_SP5$ přináší sedm nových účesů a královských pokrývek hlavy inspirovaných historickými předlohami, které zdůrazní majestát vašich postav."
 dlc_029: "$DLC029_MP1$"
 dlc_029_desc: "Balíček $DLC029_MP1$ přináší 13 skladeb, které doprovodí vaši vládu — od poklidných dvorských melodií po burcující bitevní motivy. Remasterované klasiky Crusader Kings se zde snoubí s novými aranžemi evropských lidových tanců; ideální hudební doprovod pro vaše dynastické ambice."
