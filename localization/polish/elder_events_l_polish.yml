l_polish:
  elder_events.1000.t: "Kdysi jsi mě znal" # todo: NEW TRANSLATION
  elder_events.1000.desc: ""[confusion_target.GetFirstName], můj drahoušku [elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))] — je dobré tě vidět!" můj [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] [elder.GetFirstName] se dívá mi do očí, v [elder.GetHerHis] úsměvu se zableskne jiskřička nejistoty. "Vždy jsi byl ten [confusion_target.Custom('ComplimentAdjective')]. Proto tě mám nejraději."\n\nVe [elder.GetHerHis] [GetTrait('withering_mind').GetName( GetNullCharacter )] jsem dnes svoji [confusion_target.Custom('SisterBrother')]...\n\nZítra pro ně možná budu cizí." # todo: NEW TRANSLATION
  elder_events.1000.a: "Prosím, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] — já jsem [ROOT.Char.GetFirstNameNoTooltip]!" # todo: NEW TRANSLATION
  elder_events.1000.b: "Cože... ano, také mě těší tě vidět..." # todo: NEW TRANSLATION
  elder_events.1100.t: "Schodiště do..." # todo: NEW TRANSLATION
  elder_events.1100.desc: "Kolikrát jsem už tyto schody vyšplhal. Proč se mi dnes zdá, že to je jako šplhání na hory [mountain_reference.GetName]?\n\nMé nohy se třesou. Kolena mě zradí. Není nic, co by mi zachytilo pád.\n\nPadám dolů." # todo: NEW TRANSLATION
  elder_events.1100.a: "Ááá!" # todo: NEW TRANSLATION
  elder_events.1100.bodyguard: "Pomoz mi! Zachraň mě!" # todo: NEW TRANSLATION
  EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "Tato možnost je dostupná, protože máte [GetCourtPositionType('bodyguard_court_position').GetName()]" # todo: NEW TRANSLATION
  EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "Tato možnost je dostupná, protože máte [GetCourtPositionType('court_tutor_court_position').GetName()]" # todo: NEW TRANSLATION
  partially_mute_modifier: "Částečně němý" # todo: NEW TRANSLATION
  partially_mute_modifier_desc: "Tato postava má kvůli věkem souvisejícím potížím velké obtíže s mluvením." # todo: NEW TRANSLATION
  elder_events.1200.t: "Necitlivost" # todo: NEW TRANSLATION
  elder_events.1200.desc: "Přijde to bez varování. Levá polovina mého těla znecitliví. Snažím se usmát, ale rty se nehýbou.\n\nSnažím se mluvit. Nemohu.\n\nNakonec se můj hlas vrátí. Ale strach z [ROOT.Char.GetFaith.NegativeAfterLife] přetrvává." # todo: NEW TRANSLATION
  elder_events.1200.a: "..." # todo: NEW TRANSLATION
  elder_events.1300.t: "Zapomenuté lekce" # todo: NEW TRANSLATION
  elder_events.1300.desc: "Četl jsem tyto svitky o [ROOT.Char.Custom('education_scroll_subject')]? Já... nemohu si vzpomenout. Možná ano?\n\nUrčitě byly součástí mých studií, součástí mého vzdělání...\n\nAno. Mé... vzdělání..." # todo: NEW TRANSLATION
  elder_events.1300.a: "Nemohlo to být až tak důležité..." # todo: NEW TRANSLATION
  elder_events.1300.tutor: "Potřebuji pomoc, abych si vzpomněl." # todo: NEW TRANSLATION
  elder_events.1400.t: "Skvělé milování" # todo: NEW TRANSLATION
  elder_events.1400.desc: ""Pojď do postele, můj [ROOT.Char.Custom('RomanticComplimentAdjective')] [ROOT.Char.Custom('RaunchyComplimentNoun')]," můj [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))] [lover.GetFirstName] [lover.Custom('PurrGrowl')], [lover.GetHerHis] oči hořely touhou. "Nejsi ani trochu zvědavý, co se ten tvůj [lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')] naučil?"\n\nS ďábelským úsměvem [lover.GetSheHe] kousne [lover.GetHerHis] ret a ulehne na povlečení.\n\n"Vezmi mě. Teď."" # todo: NEW TRANSLATION
  elder_events.1400.a: "Tisíc koní by mě nezastavilo!" # todo: NEW TRANSLATION
  elder_events.1400.b: "[ROOT.Char.GetFaith.HighGodName] mě chraň před tímto [lover.GetWomanMan]." # todo: NEW TRANSLATION
  death_best_sex_of_their_life: "dostal infarkt při nejlepším sexu svého života" # todo: NEW TRANSLATION
  purrs: "vrní" # todo: NEW TRANSLATION
  growls: "vrčí" # todo: NEW TRANSLATION
  raunchy_little: "malý" # todo: NEW TRANSLATION
  raunchy_sweet: "sladký" # todo: NEW TRANSLATION
  raunchy_pretty: "hezký" # todo: NEW TRANSLATION
  raunchy_bold: "drzý" # todo: NEW TRANSLATION
  raunchy_wild: "divoký" # todo: NEW TRANSLATION
  raunchy_fiery: "vášnivý" # todo: NEW TRANSLATION
  raunchy_young: "mladý" # todo: NEW TRANSLATION
  raunchy_eager: "dychtivý" # todo: NEW TRANSLATION
  elder_events.1500.t: "Pád, za který stojí zemřít" # todo: NEW TRANSLATION
  elder_events.1500.desc: ""Říkali mi jednou '[lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')]'," vzdychá můj [lover.GetWifeHusband] [lover.GetFirstName], na rtech má slabý úsměv. "Teď sotva vylezu schody, aniž bych se nezadýchal..."\n\nSe svou mladickou silou bych mu mohl pomoci si zase vzpomenout, jaké to je být žádaný.\n\nAle... vydrží jeho [GetTrait('faltering_heart').GetName( GetNullCharacter )] to?" # todo: NEW TRANSLATION
  elder_events.1500.a: "Dám [lover.GetHerHim] kotrmelec [lover.GetHerHis] života!" # todo: NEW TRANSLATION
  elder_events.1500.b: "Raději ne." # todo: NEW TRANSLATION
  elder_events.1600.t: "Času neutečeš" # todo: NEW TRANSLATION
  elder_events.1600.desc: "Běžím. Musím přestat. Už se zadýchávám.\nDříve jsem běhal kolečka kolem [ROOT.Char.Custom('ResidenceBuilding')]...\n\nZnovu začnu. Téměř spadnu. Znovu přestanu.\n\nZatraceno toto křehké tělo." # todo: NEW TRANSLATION
  elder_events.1600.a: "Dny, kdy jsem běhal, jsou pryč." # todo: NEW TRANSLATION
  elder_events.1600.b: "Já #EMP musím#! překonat bolest." # todo: NEW TRANSLATION
