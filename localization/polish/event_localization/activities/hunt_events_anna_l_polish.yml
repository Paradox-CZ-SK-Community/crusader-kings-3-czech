l_polish:
  hunt_events_anna.0001.t: "Hluboké kořeny" # todo: NEW TRANSLATION
  hunt_events_anna.0001.desc: "Velký dub se před námi tyčí se svým majestátním korunním obrostem, sahajícím daleko do stran — vše pod ním pokrývá temnota. Když se podívám vzhůru ke větvím, připomíná mi to různé dynastie, které přicházejí a odcházejí. Všichni ti, kdo byli přede mnou, a ti, kteří ponesou mé dědictví dál, až už nebudu.\n\nKdyž se přiblížím, všimnu si několika vyrytých iniciál na kůře, jemná připomínka, že lidé přicházejí a odcházejí v průběhu věků. A osoba, se kterou bych své dědictví chtěla sdílet, je mé všechno, [love_interest.GetFirstName]." # todo: NEW TRANSLATION
  hunt_events_anna.0001.a: "Vytesat iniciály [love_interest.GetFirstNameNoTooltip] do kůry" # todo: NEW TRANSLATION
  hunt_events_anna.0001.b: "Na takové nesmysly není čas!" # todo: NEW TRANSLATION
  hunt_events_anna.0001.b.t_toast: "Lov je mou hlavní prioritou." # todo: NEW TRANSLATION
  hunt_events_anna.0005.t: "Pod mou kůží" # todo: NEW TRANSLATION
  hunt_events_anna.0005.desc: "Můj krátký odpočinek přeruší posměšný smích přicházející směrem ke mně. Podívám se vzhůru a ne příliš překvapivě mě vítá široký úsměv [mocking_participant.GetFirstName], který v ruce drží to, co vypadá jako mrtvé [ROOT.Char.Custom('SmallAnimal')] v [mocking_participant.GetHerHis] sevření.\n\n\"Nikdy jsem si nemyslel(a), že bys dokázal(a) přežít sám/sama v divočině, takže jsem si říkal(a), že bys mohl(a) potřebovat trochu praxe,\" říká [mocking_participant.GetSheHe|U] s posměšným tónem a hází kus mršiny přímo přede mě." # todo: NEW TRANSLATION
  hunt_events_anna.0005.a: "Pokusit se zvíře oškubat." # todo: NEW TRANSLATION
  hunt_events_anna.0005.a.toast.good: "Úspěšně stáhnu kůži ze zvířete" # todo: NEW TRANSLATION
  hunt_events_anna.0005.a.toast.nothing: "Zbytky jsou nerozeznatelné" # todo: NEW TRANSLATION
  hunt_events_anna.0005.b: "Trénink? Proč ne..." # todo: NEW TRANSLATION
  hunt_events_anna.0005.c: "Není to na mně, abych dělal(a) takovou podřadnou práci." # todo: NEW TRANSLATION
  hunt_events_anna.0010.t: "Uvízl dole" # todo: NEW TRANSLATION
  hunt_events_anna.0010.desc: "S těžkými a nestabilními kroky stopuji svou kořist přes [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')], soustředěný(á) na udržení tempa. Prudké prasknutí se mi rozléhá v uších. Cítím náhlou beztížnost a v hlubině žaludku mě ovane hluboké bušení. Pád se zastaví a z nárazu mi projede pálivá bolest celým tělem.\n\nKdyž se bolestivě rozhlédnu, vidím kolem sebe čtyři zdi. Spadl(a) jsem do pasti a potřebuji najít způsob, jak se dostat zpět nahoru." # todo: NEW TRANSLATION
  hunt_events_anna.0010.a: "Vyšplhat ven z díry." # todo: NEW TRANSLATION
  hunt_events_anna.0010.a.desc.good: "Úspěšně vyšplhám ven" # todo: NEW TRANSLATION
  hunt_events_anna.0010.a.toast.good: "Přes bolest se probojuji ven" # todo: NEW TRANSLATION
  hunt_events_anna.0010.a.toast.bad: "Ještě jednou zakopnu a při tom se zraním" # todo: NEW TRANSLATION
  hunt_events_anna.0010.a.desc.bad: "Sklouznu a padnu zpět do díry" # todo: NEW TRANSLATION
  hunt_events_anna.0010.b: ""Je tam někdo?!"" # todo: NEW TRANSLATION
  hunt_events_anna.0010.b.flavor: "Lovci přeruší lov a místo toho mi pomohou." # todo: NEW TRANSLATION
  hunt_events_anna.0015.t: "Nadechni se... Vydechni" # todo: NEW TRANSLATION
  hunt_events_anna.0015.desc: "Podivné tlumené dunění, nízké mumlání a občasný povzdech se odrážejí v háji. Postava s lukem chodí sem a tam, zjevně něčím rozmrzele.\n\nAbych se podíval(a) blíž, schovám se za strom a jemně nahlédnu. Vidím svého [child_with_bow.Custom('GetDaughterSon')] [child_with_bow.GetFirstName], obklopeného několika šípy roztroušenými po zemi, které sotva zasahují cíl, který si [child_with_bow.GetSheHe] nastavil(a). Vypadá to, že by [child_with_bow.GetSheHe] mohl(a) potřebovat trochu vedení." # todo: NEW TRANSLATION
  hunt_events_anna.0015.a: ""Tady, nech mě ti to ukázat..."" # todo: NEW TRANSLATION
  hunt_events_anna.0015.a.flavor: "Jako zdatný lovec bych měl být schopen využít své zkušenosti a dát [child_with_bow.GetHerHim] lepší postoj a přesnost." # todo: NEW TRANSLATION
  hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip] poslechne mé pokyny" # todo: NEW TRANSLATION
  hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip] mým pokynům nerozumí" # todo: NEW TRANSLATION
  hunt_events_anna.0015.b: "Podpořit [child_with_bow.GetHerHim] povzbuzováním." # todo: NEW TRANSLATION
  hunt_events_anna.0015.c: "Nechat [child_with_bow.GetFirstNameNoTooltip], ať si s tím poradí." # todo: NEW TRANSLATION
  hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip] přijde na to, jak zacházet s lukem" # todo: NEW TRANSLATION
