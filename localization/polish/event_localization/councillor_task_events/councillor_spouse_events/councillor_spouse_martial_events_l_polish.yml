l_polish:
  councillor_spouse_martial.0001.message: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U] Povzbuzuje nábor"
  councillor_spouse_martial.0002.message: "Pomoc při organizaci armády"
  councillor_spouse_martial.0003.message: "Inspirující [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U]"
  councillor_spouse_martial.0004.message: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U] Povzbuzuje rytířství"
  councillor_spouse_martial.0005.message: "Podpora při vyjednávání s žoldáky"
  councillor_spouse_martial.0006.message: "Stará se o mě"
  councillor_spouse_martial.0007.message: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|U] Ošetřuje rány"
  councillor_spouse_martial.0008.message: "Zastrašující přítomnost"
  councillor_spouse_martial.0009.message: "Bojový výcvik"
  councillor_spouse_martial.1001.t: "[councillor.GetCouncilTitle]:  Den turnaje" # todo: CHANGED
  councillor_spouse_martial.1001.desc: "Slunce svítí a sedláci se hemží na turnaji, který pořádá můj [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))]. Všichni moji $knight_culture_player_plural_no_tooltip_lowercase$ jásají, když [councillor.GetTitledFirstName] oznamuje turnaj na jejich počest, a poprvé si mohu prostě jen sedět a dívat se.\n\nAle celý den turnaje nehodlám prosedět přilepený k trůnu!"
  councillor_spouse_martial.1001.a: "Také já fandím svým $knight_culture_player_plural_no_tooltip_lowercase$!"
  councillor_spouse_martial.1001.commanders: "Každý $knight_culture_player_no_tooltip_lowercase$"
  councillor_spouse_martial.1001.b: "To je ideální příležitost dát [child.GetFirstNameNoTooltip] několik rad!"
  councillor_spouse_martial.1001.b.education_tt: "Pokročím v [child.GetFirstNamePossessiveNoTooltip] vojenském vzdělání"
  councillor_spouse_martial.1001.c: "Tento den je #EMP naší#! ctí, miláčku!"
  councillor_spouse_martial.1002.t: "[councillor.GetCouncilTitle]:  Jednání v mém zastoupení" # todo: CHANGED
  councillor_spouse_martial.1002.desc: "Můj [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] tráví značnou část času cestováním po panství se [councillor.GetHerHis] čestnou gardou. Je mnoho záležitostí, které [councillor.GetSheHe] může vyřídit mým jménem, a vojenská přítomnost, kterou [councillor.GetTitledFirstName] přivádí s [councillor.GetHerHim], je silným připomenutím mého práva vládnout."
  councillor_spouse_martial.1002.a: "Můj [councillor.GetTitleAsNameNoTooltip] a já jsme připraveni bránit říši!"
  councillor_spouse_martial.1002.b: "Ujisti se, že se lidé patřičně podřizují, miláčku."
  councillor_spouse_martial.1002.c: "Všichni by se mě měli bát i padat mi k nohám, [councillor.GetFirstNameNoTooltip]!"
  councillor_spouse_martial.1003.t: "[councillor.GetCouncilTitle]:  Záležitost cti" # todo: CHANGED
  councillor_spouse_martial.1003.desc: "Můj [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('councillor'))]. Jedná se o spor mezi [attacker_vassal.GetTitledFirstName] a [defender_vassal.GetTitledFirstName], který [councillor.GetSheHe] chce projednat.\n\n\"Jejich boj je bez cti, a přináší hanbu tvému panství. Nech to na mně. Vím, že je dokážu přinutit k míru.\""
  councillor_spouse_martial.1003.a: "Urovnej to, ať to stojí cokoliv."
  councillor_spouse_martial.1003.b: "Ne, chci vidět, kdo vyhraje!"
  councillor_spouse_martial.1003.b.tt: "[attacker_vassal.GetFirstNameNoTooltip] a [defender_vassal.GetFirstNameNoTooltip] pokračují ve své válce"
  councillor_spouse_martial.1003.c: "Och, věřím, že to zvládneš, miláčku."
  councillor_spouse_martial.1003.c.unlock_tt: "Tato možnost je dostupná díky [councillor.GetFirstNamePossessiveNoTooltip] strategickému důvtipu"
  councillor_spouse_martial.1004.t: "[councillor.GetCouncilTitle]:  Stráž" # todo: CHANGED
  councillor_spouse_martial.1004.desc: "Trochu mě mate, proč chce můj [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))] na nádvoří předat mi \"velký dar\". Brzy to však pochopím, když [councillor.GetTitledFirstName] nechá skupinu vojáků postavit do řady. \"Celý pluk, sestavený z mých vlastních zemí, připravený ti sloužit.\"\n\nTo je #EMP opravdu#! velký dar!"
  councillor_spouse_martial.1004.a: "Více vojáků na posílení armády!"
  councillor_spouse_martial.1004.b: "Budou sloužit jako moje osobní stráž."
  councillor_spouse_martial.1005.t: "[councillor.GetCouncilTitle]:  Zanechání dojmu" # todo: CHANGED
  councillor_spouse_martial.1005.desc: "[vassal.GetTitledFirstName] přijíždí do [capital.GetNameNoTier], aby mi složil tribut. Nicméně [councillor.GetTitledFirstName] naznačuje, že vojenská přehlídka by mohla zajistit jejich trvalou loajalitu.\n\n\"Uvidět tvou ohromnou sílu by každého přimělo dvakrát se zamyslet, kdyby mu někdy proběhla hlavou zrada,\" poznamenává můj [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))]."
  councillor_spouse_martial.1005.a: "Ano, [vassal.GetFirstNameNoTooltip] uvidí vojáky všude, kam se [vassal.GetSheHe] otočí!"
  councillor_spouse_martial.1005.a.tt: "[vassal.GetFirstNameNoTooltip] se stane náchylnějším k [dread|E]"
  councillor_spouse_martial.1005.b: "Běžná přehlídka by měla stačit."
