l_polish:
  intrigue_events_bjorn.5100.t: "Lekce srdce" # todo: NEW TRANSLATION
  intrigue_events_bjorn.5100.desc: "Když pozoruji mého milovaného [the_lover.GetFirstName], napadá mě, že bych se od tak úžasné osoby mohl mnoho naučit. [the_lover.GetHerHis|U] mysl je jako poklad, který lze dobýt; a mám také pár věcí, které mohu [the_lover.GetFirstName] naučit.\n\nNavíc je to tak krásný způsob, jak trávit čas spolu!" # todo: NEW TRANSLATION
  intrigue_events_bjorn.5100.a: "Má láska mě toho může tolik naučit." # todo: NEW TRANSLATION
  intrigue_events_bjorn.5100.b: "[the_lover.GetSheHe|U] bude skvělým žákem." # todo: NEW TRANSLATION
  intrigue_events_bjorn.5100.c: "Stačí mi, že trávíme čas spolu." # todo: NEW TRANSLATION
  intrigue_events_bjorn.5101.t: "Společné zájmy" # todo: NEW TRANSLATION
  intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName] mě tolik fascinuje! Chci si užít to, co [the_lover.GetHerHim] přináší radost.\n\nAch, trávit blažené dny spolu:\n\nRuky pracující společně, mysli zaměřené na společné zájmy.\n\nNaše srdce bijí jako jedno." # todo: NEW TRANSLATION
  intrigue_events_bjorn.5101.a: "Ukaž mi, co rozdmýchává tvé vášně, miláčku." # todo: NEW TRANSLATION
  intrigue_events_bjorn.5101.b: "Pojď, poděl se se mnou o tu radost." # todo: NEW TRANSLATION
  intrigue_events_bjorn.5101.c: "Co kdybychom se spolu naučili něco nového?" # todo: NEW TRANSLATION
  intrigue_events_bjorn.5102.t: "Milovat stín" # todo: NEW TRANSLATION
  intrigue_events_bjorn.5102.desc: "Když se k sobě víc přibližujeme, stojíme nyní na prahu. Možná je čas sdílet opravdu všechno, abychom věděli všechno, co se vědět dá. Sdílet věci, které se obvykle… nesdílejí.\n\nOdtud není návratu, ale přijme [the_lover.GetFirstName] všechno, co o mně vědět lze?" # todo: NEW TRANSLATION
  intrigue_events_bjorn.5102.a: "Mám ti co ukázat." # todo: NEW TRANSLATION
  intrigue_events_bjorn.5102.b: "Řekni mi, co jsi s nikým jiným nesdílel(a)." # todo: NEW TRANSLATION
  intrigue_events_bjorn.5102.c: "Pojďme prozkoumat naše nejtemnější fantazie." # todo: NEW TRANSLATION
  intrigue_events_bjorn.5102.d: "Ne! Některé věci by neměly nikdy vyjít na světlo." # todo: NEW TRANSLATION
