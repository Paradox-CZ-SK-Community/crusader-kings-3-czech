l_polish:
  SITUATION_LIST_STORY_CYCLE_MODIFIERS_HEADER: "Modifikátory" # todo: NEW TRANSLATION
  SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "Rozhodnutí" # todo: NEW TRANSLATION
  not_yet_chosen: "ještě nevybráno" # todo: NEW TRANSLATION
  story_cycle_pet_dog: "Domácí pes" # todo: NEW TRANSLATION
  story_cycle_pet_dog_desc: "#F Věrný psí společník kráčí po vašem boku, poskytuje ochranu a pouto věrnosti, jaké málokterý člověk dokáže nabídnout.#!" # todo: NEW TRANSLATION
  DOG_INFORMATION_STRING: "Jméno vašeho psa je #V [Story.Custom('DogStoryNameAll')].#!\n[Story.Custom('DogStoryHerHisAll')|U] srst je [Story.Custom('DogFurColorAll')], [Story.Custom('DogStoryHerHisAll')] oči jsou [Story.Custom('DogEyeColorAll')], a [Story.Custom('DogStorySheHeAll')] je [Story.Custom('DogStoryPuppyOrAgeAll')].\n[Story.Custom('DogStorySheHeAll')|U] je velmi dobrý [Story.Custom('DogStoryGirlBoyAll')]." # todo: NEW TRANSLATION
  dog_age_puppy: "štěně" # todo: NEW TRANSLATION
  dog_age_proper: "[Story.MakeScope.Var('dog_age_variable').GetValue|0] let" # todo: NEW TRANSLATION
  cat_age_kitten: "kotě" # todo: NEW TRANSLATION
  cat_age_proper: "[Story.MakeScope.Var('cat_age_variable').GetValue|0] let" # todo: NEW TRANSLATION
  story_cycle_pet_cat: "Domácí kočka" # todo: NEW TRANSLATION
  story_cycle_pet_cat_desc: "#F Pyšná kočka vám dělá společnost, hbitý lovec, který projevuje náklonnost jen za svých podmínek.#!" # todo: NEW TRANSLATION
  CAT_INFORMATION_STRING: "Jméno vaší kočky je #V [Story.Custom('CatStoryNameAll')].#!\n[Story.Custom('CatStoryHerHisAll')|U] srst je [Story.Custom('CatFurColorAll')], [Story.Custom('CatStoryHerHisAll')] oči jsou [Story.Custom('CatEyeColorAll')], a [Story.Custom('CatStorySheHeAll')] je [Story.Custom('CatStoryKittenOrAgeAll')].[Story.Custom('CatStupidOrNotStupidAll')]" # todo: NEW TRANSLATION
  dumb_but_sweet_orange_boy: "\n[Story.Custom('CatStorySheHeAll')|U] je trochu hloupý [Story.Custom('CatFurColorAll')] [Story.Custom('CatStoryGirlBoyAll')], ale velmi přítulný." # todo: NEW TRANSLATION
  story_cycle_pet_eagle: "Lovecký orel" # todo: NEW TRANSLATION
  story_cycle_pet_eagle_desc: "#F Na vaší rukavici posedává lovecký orel, stále bdělý, stále hladový, přinášející smrt shora.#!" # todo: NEW TRANSLATION
  EAGLE_INFORMATION_STRING: "Jméno vašeho orla je #V [Story.Custom('EagleStoryNameAll')].#!\n[Story.Custom('EagleStorySheHeAll')|U] je [Story.MakeScope.Var('eagle_age_variable').GetValue|0] let." # todo: NEW TRANSLATION
  bp2_hostage_loyalty: "Věrný zajatec" # todo: NEW TRANSLATION
  bp2_hostage_loyalty_desc: "Jeden z vašich [hostages|E] si k vám a vašim způsobům začíná vytvářet přízeň." # todo: NEW TRANSLATION
  hostage: "[hostage|E]" # todo: NEW TRANSLATION
  HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "Váš [hostage|E], [Story.MakeScope.Var('hostage_target').Char.GetUIName], vyrůstá na vašem [court|E], což ovlivňuje [Story.MakeScope.Var('hostage_target').Char.GetHerHis] loajalitu. Udržujte [Story.MakeScope.Var('hostage_target').Char.GetHerHis] [opinion|E] vysoké a vybírejte správné možnosti v událostech, aby měl [Story.MakeScope.Var('hostage_target').Char.GetHerHim] větší šanci být vám věrný, až [Story.MakeScope.Var('hostage_target').Char.GetSheHe] dospěje.\n\nSoučasná loajalita: [Story.MakeScope.Var('theon_points').GetValue|0+]" # todo: NEW TRANSLATION
  LOYALTY_LABEL: "Body věrnosti" # todo: NEW TRANSLATION
  claimant: "[claimant|E]" # todo: NEW TRANSLATION
  diverted_crusaders: "Odvedení křižáci" # todo: NEW TRANSLATION
  frankokratia_story: "Frankokratia" # todo: NEW TRANSLATION
  frankokratia_story_desc: "Nárokovatel na [GetTitleByKey('e_byzantium').GetName|l] přilákal západní oportunisty z jejich křížové výpravy, obracející jejich chamtivé meče přímo proti srdci křesťanstva..." # todo: NEW TRANSLATION
  FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "[War|E] proti [GetTitleByKey('e_byzantium').GetHolder.GetShortUIName] rozhodne o budoucnosti [GetTitleByKey('e_byzantium').GetName|l]. Buď [claimant|E] [Story.MakeScope.Var('byz_claimant').Char.GetUIName] uchopí trůn a zaplatí křižákům za jejich úsilí — nebo bude zřízeno nové [GetTitleByKey('e_latin_empire').GetBaseName] pod [GetFaithByKey('catholic').GetAdjective] nadvládou." # todo: NEW TRANSLATION
  story_conqueror: "Dobyvatel" # todo: NEW TRANSLATION
  story_conqueror_desc: "Vaše ambice neznají hranic! Svět leží před vámi a je zralý k dobytí." # todo: NEW TRANSLATION
  CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "Dobyvatelé získávají mnoho silných výhod, například snížení [factions|E], přístup k [vassalize_casus_belli|E], a občasné silné události.\n\nPřestanete být Dobyvatelem, pokud:\n$BULLET_WITH_TAB$Nejste [independent|E]\n$BULLET_WITH_TAB$Váš titul je snížen na [count|E]\n$BULLET_WITH_TAB$Stanete se [unlanded|E]\n$BULLET_WITH_TAB$Nevedete [war|E] po dobu #V 10#! let\n$BULLET_WITH_TAB$Jste hluboce ve [debt|E]\n$BULLET_WITH_TAB$Prohrajete #V 3#! nebo více [wars|E]\n$BULLET_WITH_TAB$Stanete se [GetTrait('incapable').GetName( GetNullCharacter )]" # todo: NEW TRANSLATION
  story_destiny_child: "Osudové dítě" # todo: NEW TRANSLATION
  story_destiny_child_desc: "Narodilo se dítě s velkým talentem, jako by jej vybral sám osud." # todo: NEW TRANSLATION
  DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "Občas se narodí dítě předurčené ke velikosti. Vyvíjí se rychleji než obvykle a dosahuje výšin, kterých jiní nedosáhnou.\n\nPečujte dobře o [Story.MakeScope.Var('destiny_child').Char.GetUIName] a zvažte, že z [Story.MakeScope.Var('destiny_child').Char.GetHerHim] uděláte svého [player_heir|E] — například tím, že [Story.MakeScope.Var('destiny_child').Char.GetHerHim] učiníte svým [designated_heir|E]." # todo: NEW TRANSLATION
  CHILD_OF_DESTINY: "Osudové dítě" # todo: NEW TRANSLATION
  story_cycle_martial_lifestyle_warhorse: "Válečný kůň" # todo: NEW TRANSLATION
  story_cycle_martial_lifestyle_warhorse_desc: "Máte k dispozici obzvlášť dobře vycvičeného válečného koně. Ať se vaši nepřátelé třesou před vaší ránou." # todo: NEW TRANSLATION
  WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "Váš válečný kůň se jmenuje #V [Story.Custom('WarhorseStoryNameAll')]#!. [Story.Custom('HorseStorySheHeAll')|U] je [Story.Custom('HorseStoryMareStallionAll')]." # todo: NEW TRANSLATION
  DOPPELGANGER: "Váš [Glossary( 'Doppelgänger', 'DOPPELGANGER_GLOSS' )]" # todo: NEW TRANSLATION
  story_doppelganger: "Zrcadlo v blátě" # todo: NEW TRANSLATION
  DOPPELGANGER_GLOSS: "Dvojník nebo napodobenina živé osoby, často potkaný náhodou. V německém folklóru jde o podivuhodné zjevení a špatné znamení — spatření vlastního dvojníka může předcházet nemoci nebo smrti." # todo: NEW TRANSLATION
  story_doppelganger_desc: "Byl nalezen rolník nápadně podobný vám — pravý [Glossary( 'doppelgänger', 'DOPPELGANGER_GLOSS' )]..." # todo: NEW TRANSLATION
  DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "Rolník, který vypadá a mluví stejně jako vy, může být příležitostí... nebo kletbou. Prozatím [Story.MakeScope.Var('doppelganger_character').Char.GetUIName] sídlí na vašem [court|E]." # todo: NEW TRANSLATION
  story_cycle_hunt_mystical_animal: "Lov mystického zvířete" # todo: NEW TRANSLATION
  story_cycle_hunt_mystical_animal_desc: "Během lovu jste zahlédli mystické, bílé zvíře. Chytit ho by bylo jako najít svatý grál!" # todo: NEW TRANSLATION
  WHITE_ANIMAL_INFORMATION_STRING: "Jste na stopě #V Bílého [Story.MakeScope.Var('animal_type').GetFlagName|U]#!.\n\nJeho chycení by přineslo velké odměny — ale získáváte [stress|E] pokaždé, když se vám [Story.MakeScope.Var('animal_type').GetFlagName] vyškube. Občas vám [GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip] umožní pokračovat v honbě.\n\nSetkání s Bílým [Story.MakeScope.Var('animal_type').GetFlagName]: [Story.MakeScope.Var('encounters').GetValue|0V] #weak (od prvního setkání)#!" # todo: NEW TRANSLATION
  LEGENDARY_COUNTY_LABEL: "Současný domov Bílého [Story.MakeScope.Var('animal_type').GetFlagName|U]" # todo: NEW TRANSLATION
  story_sycophant: "Pochlebovač" # todo: NEW TRANSLATION
  story_sycophant_desc: "Jeden z vašich dvořanů, očividný pochlebovač, rozčiluje vaše vazaly pouhou svou přítomností." # todo: NEW TRANSLATION
  SYCOPHANT_INFORMATION_STRING: "Můj [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )] [Story.MakeScope.Var('sycophant_character').Char.GetShortUIName] a můj [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )] [Story.MakeScope.Var('jealous_character').Char.GetShortUIName] jsou na nože. Mohu si vybrat oblíbence, ale tím jistě rozzuřím toho druhého. Čas ukáže, jak se situace vyvine..." # todo: NEW TRANSLATION
  SYCOPHANT_LABEL: "Pochlebovač" # todo: NEW TRANSLATION
  JEALOUS_VASSAL_LABEL: "Můj nejžárlivější vazal" # todo: NEW TRANSLATION
  story_cycle_pet_rock: "Kamenný mazlíček" # todo: NEW TRANSLATION
  story_cycle_pet_rock_desc: "Po vašem boku je kamenný mazlíček, jeho neměnný obličej je dokonalým doplněním vašeho zvláštního smyslu pro společnost." # todo: NEW TRANSLATION
  PET_ROCK_INFORMATION_STRING: "Váš kámen se jmenuje #V [Story.GetOwner.Custom('RockStoryName')].#!\n[Story.GetOwner.Custom('RockStoryHerHis')|U] hrubý povrch je [Story.GetOwner.Custom('RockColor')]." # todo: NEW TRANSLATION
  story_cycle_admin_eunuch: "Význačný eunuch" # todo: NEW TRANSLATION
  story_cycle_admin_eunuch_desc: "Eunuch s mimořádnými schopnostmi našel cestu do vašeho dvora. Příležitost, nebo hrozba..?" # todo: NEW TRANSLATION
  EUNUCH_INFORMATION_STRING: "Postupem času budete mít příležitosti udělit [Story.MakeScope.Var('eunuch').Char.GetShortUIName] větší moc a vliv. Tím se zvýší síla [GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip] [modifier|E].\n\nAle pozor — pohrdněte [Story.MakeScope.Var('eunuch').Char.GetHerHim], nebo dejte [Story.MakeScope.Var('eunuch').Char.GetHerHim] #EMP příliš mnoho#! moci, aniž byste zajistili [Story.MakeScope.Var('eunuch').Char.GetHerHis] loajalitu, a následky mohou být hrozivé...\n\nDosud jste [Story.MakeScope.Var('eunuch_refusals').GetValue|0V] krát odmítl žádosti [Story.MakeScope.Var('eunuch').Char.GetHerHis]." # todo: NEW TRANSLATION
  EUNUCH_LABEL: "Eunuch" # todo: NEW TRANSLATION
  UPSET_COURTIERS: "Dvorané rozzlobení na eunucha" # todo: NEW TRANSLATION
  POETRY_BOOK_LABEL: "Moje sbírka básní" # todo: NEW TRANSLATION
  commission_epic_story: "Objednat epos" # todo: NEW TRANSLATION
  commission_epic_story_desc: "Objednáváte velký epos, který bude zaznamenávat činy vaší rodiny." # todo: NEW TRANSLATION
  EPIC_INFORMATION_STRING: "Váš [Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))] vytváří epos [Story.Custom('CompositionTypeAll')] za účelem zvýšení [dynasty_prestige|E] rodu [Story.GetOwner.GetDynasty.GetName] [dynasty|E] a získání [artifact|E].\n\nŠance na výjimečný [Story.Custom('CompositionTypeAll')] je: [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]" # todo: NEW TRANSLATION
  COMPOSER: "Skladatel vašeho eposu" # todo: NEW TRANSLATION
  story_foreign_raised_reformer: "Reformátor vychovaný v cizině" # todo: NEW TRANSLATION
  story_foreign_raised_reformer_desc: "Vyrůstal(a) jste daleko od země, kterou nyní nazýváte domovem.\nTak odlišné... a přesto — co kdyby byl váš domov víc jako tamto místo?" # todo: NEW TRANSLATION
  REFORMER_INFORMATION_STRING: "Byl(a) jste vychován(a) v [Story.MakeScope.Var('advanced_realm').Title.GetBaseName] u [Story.MakeScope.Var('foreign_educator').Char.GetShortUIName], [Story.MakeScope.Var('advanced_culture').Culture.GetName] [Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective]. Byl(a) jste ohromen [Story.MakeScope.Var('advanced_culture').Culture.GetName] [culture|E] a přejete si, aby váš lid byl více jako oni.\n\nZačnou se vám nabízet příležitosti k získání bodů Reformy nebo Potvrzení:\n$BULLET_WITH_TAB$#indent_newline:7 Při usilování o Reformaci můžete získat [innovations|E], [cultural_acceptance|E], [traditions|E], nebo možná i [GetBuilding('generic_university').GetName]. Mějte na paměti, že reformování je dlouhý a nákladný proces.#!\n$BULLET_WITH_TAB$#indent_newline:7 Při usilování o Potvrzení můžete získat [vassal|E] [opinion|E], [dynasty_prestige|E], bonusy do [war|E] ve formě [casus_bellis|E] a [special_troops|E].#!" # todo: NEW TRANSLATION
  REFORM_LABEL: "Pokrok ve reformování vaší [culture|E]" # todo: NEW TRANSLATION
  REAFFIRMATION_LABEL: "Pokrok v potvrzení vaší [culture|E]" # todo: NEW TRANSLATION
  REFORM_MIN_VALUE_LABEL: "" # todo: NEW TRANSLATION
  REFORM_MAX_VALUE_LABEL: "Max: #V 3#!" # todo: NEW TRANSLATION
  REAFFIRMATION_MIN_VALUE_LABEL: "" # todo: NEW TRANSLATION
  REAFFIRMATION_MAX_VALUE_LABEL: "Max: #V 2#!" # todo: NEW TRANSLATION
  ECCENTRIC_MIN_VALUE_LABEL: "" # todo: NEW TRANSLATION
  ECCENTRIC_MAX_VALUE_LABEL: "Max: #V 5#!" # todo: NEW TRANSLATION
  IMAGINARY_FRIEND_INFORMATION_STRING: "Jméno vašeho smyšleného přítele je [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]. Občas dostanete příležitosti se s [Story.MakeScope.Var('imaginary_friend_name').Char.GetHerHim] stýkat." # todo: NEW TRANSLATION
  ECCENTRIC_VALUE: "Pokrok směrem k získání [GetTrait('eccentric').GetName( GetNullCharacter )]" # todo: NEW TRANSLATION
  story_cycle_imaginary_friend: "Smyšlený přítel" # todo: NEW TRANSLATION
  story_cycle_imaginary_friend_desc: "Konečně přítel, se kterým si hrát! Koho zajímá, že není skutečný? Pro mě je skutečný!" # todo: NEW TRANSLATION
  story_greatest_of_khans: "Největší z chánů" # todo: NEW TRANSLATION
  story_greatest_of_khans_desc: "Na nebesích je mnoho světel. Na nebesích slunce, měsíc a hvězdy. Ale na zemi může být pouze jeden chán." # todo: NEW TRANSLATION
  GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial Pokud vaše [dynasty|E] ztratí kontrolu nad [Story.GetOwner.GetPrimaryTitle.GetName|l], přestane být [GetGovernment( 'nomad_government' ).GetName], nebo neuskuteční #high $mpo_gok_world_conquest_decision$#! [decision|E] do roku #high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!, tyto bonusy budou ztraceny a [Story.GetOwner.GetPrimaryTitle.GetName|l] se může rozpadnout!#!" # todo: NEW TRANSLATION
