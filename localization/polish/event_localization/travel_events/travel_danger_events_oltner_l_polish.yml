l_polish:
  travel_danger_events.9000.t: "$travel_danger_prefix$ Bzučivá pohroma"
  travel_danger_events.9000.desc: "The [location.Custom('GetTerrainTypePlural')] of [location.GetName] are #EMP swarming#! with tiny, dark, bloodsucking insects. No matter what we do, or where we go, they are there — leeching our blood like a torturous cloud sent by [ROOT.Char.GetFaith.DevilName] [ROOT.Char.GetFaith.DevilHerselfHimself]!\n\nNot only are the horses getting flighty and temperamental, but my entourage is as well... especially my [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('mosquito_victim'))] [mosquito_victim.GetFirstName], who is furiously flailing [mosquito_victim.GetHerHis] sanguine-covered arms."
  travel_danger_events.9000.deviant: "#EMP Delightful!#! Everyone, strip!"
  travel_danger_events.9000.herbalist: "I think this herb might help us..."
  travel_danger_events.9000.a: "Push through, they are mere #EMP insects!#!"
  travel_danger_events.9000.b: "[mosquito_victim.GetFirstNameNoTooltip]! Strip down, you'll walk in the front."
  drained_by_mosquitoes_modifier: "Oslaben komáry"
  drained_by_mosquitoes_modifier_desc: "This character has been assaulted by a swarm of blood-sucking insects, draining a non-insignificant amount of their sanguine essence."
  travel_danger_events.9010.t: "$travel_danger_prefix$ Klacek v kolech"
  travel_danger_events.9010.desc: ""[location.Custom('GetRandomRegionalDanger')|U]!" I hear [irritated_character.GetFirstName] shout out in panic. Soon thereafter I hear a loud cracking sound — like that of wood breaking, or of my patience finally snapping.\n\nI step out on the [location.Custom('GetProvinceGroundDesc')] to see the splintered remains of a wagon-wheel... #EMP my#! wagon-wheel!\n\n"I am sorry, my [irritated_character.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))]. It was my turn as lookout, and I fell asleep at the reins..."""
  travel_danger_events.9010.strong: "#EMP *Sigh loudly while heaving the wagon off the ground*#!"
  travel_danger_events.9010.a: "[root_scope.Custom('CulturalCurse')|U]... we're going to be late."
  travel_danger_events.9010.b: "Shuffle the supplies around, I'll ride rough from now on..."
  travel_danger_events.9020.t: "$travel_danger_prefix$ Náhlá vyhublost"
  travel_danger_events.9020.desc.first: ""We... we are #EMP completely#! out of [ROOT.Char.Custom('GetExpensiveDessert')]!" My [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('emaciated_character'))] [emaciated_character.GetFirstName] stammers nervously. "And [ROOT.Char.Custom('GetExpensiveMeal')], and [ROOT.Char.Custom('GetExpensiveMealAlt')], and [ROOT.Char.Custom('GetLocalStreetFoodPlural')], and even #EMP [ROOT.Char.Custom('get_region_root_vegetable_plural')]!#!"\n\n"
  travel_danger_events.9020.desc.war: ""Those scavenging soldiers made off with everything we had in the night! We're not left with a #EMP single crumb!#!" [emaciated_character.GetSheHe|U] cries. "We're going to starve!""
  travel_danger_events.9020.desc.other: ""We should have packed more food — there's not a #EMP single crumb#! left, and nothing to eat as far as the eye can see!" [emaciated_character.GetSheHe|U] cries. "We're going to starve!""
  travel_danger_events.9020.desc.last: "\n\nPerhaps I shouldn't have had that triple-serving of [ROOT.Char.Custom('GetExpensiveMeal')] with [ROOT.Char.Custom('GetFoodDetail')] sauce yesterday?"
  travel_danger_events.9020.desc.last.alt: "\n\nBut.. I've been eating like a dormouse, how is this fair?"
  travel_danger_events.9020.a: "I wish we could eat those words..."
  travel_danger_events.9020.b: "What little we have goes to #EMP me!#!"
  travel_danger_events.9020.hunter: "There's bound to be prey somewhere!"
  travel_danger_events.9020.cannibal: "Oh [emaciated_character.GetFirstNameNoTooltip], would you give your life for [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]?"
  emaciated_modifier: "Vychrtlý"
  emaciated_modifier_desc: "This character has traveled for a long distance without any food at all."
  cannibalicus_maximus: "You and all entourage members will get the Cannibal [secret|E], if you're not already Cannibals"
  travel_danger_events.9030.t: "$travel_danger_prefix$ Uvízli v blátě" # todo: NEW TRANSLATION
  travel_danger_events.9030.desc: "Dnes sice neprší silně, ale vytrvale — cesta před námi se mění v husté bahno. Vozy se boří a mlha ztěžuje vidění.\n\nNa nějakou dobu se nikam nepohneme." # todo: NEW TRANSLATION
  travel_danger_events.9030.caravan_master: "Můj [GetCourtPositionType('travel_leader_court_position').GetNameNoTooltip()] si poradí s trochou bahna." # todo: NEW TRANSLATION
  travel_danger_events.9030.a: "Prokleté počasí." # todo: NEW TRANSLATION
  EVENT_WINDOW_OPTION_AVAILABLE_CARAVAN_MASTER: "Tato možnost je dostupná díky vašemu [GetCourtPositionType('travel_leader_court_position').GetName()]" # todo: NEW TRANSLATION
  travel_danger_events.9040.t: "$travel_danger_prefix$ Dešťová bouře" # todo: NEW TRANSLATION
  travel_danger_events.9040.desc: "Nic nevidím — déšť je příliš silný. Jsme promočení až na kost a s každým hromem se koně rozruší.\n\nPak mi dojde něco hrozného...\n\nKde je můj [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))], [victim.GetFirstName]?" # todo: NEW TRANSLATION
  travel_danger_events.9040.caravan_master: "[travel_leader.GetFirstNameNoTooltip], najdi [victim.GetHerHim]!" # todo: NEW TRANSLATION
  travel_danger_events.9040.a: "Ať má [ROOT.Char.GetFaith.HighGodName] milost nad [victim.GetFirstNameNoTooltip]." # todo: NEW TRANSLATION
  low_aptitude_caravan_master_reason_tooltip: "[travel_leader.GetFirstNamePossessive|U] [aptitude|E] jako [GetCourtPositionType('travel_leader_court_position').GetName()] je pouze [travel_leader.GetCourtPositionAptitude( GetCourtPositionType( 'travel_leader_court_position' ) )]" # todo: NEW TRANSLATION
  travel_danger_events.9050.t: "$travel_danger_prefix$ Bloudící mysl" # todo: NEW TRANSLATION
  travel_danger_events.9050.desc: "Cestování s mým [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))], [victim.GetFirstName], se stalo výzvou — [victim.GetHerHis] [GetTrait('withering_mind').GetName( GetNullCharacter )] se s každým dnem více vytrácí.\n\nStále musím připomínat [victim.GetHerHim]: #EMP \"Míříme do [ROOT.Char.GetTravelPlan.GetData.GetFinalDestination.GetProvince.GetName]! [ROOT.Char.GetTravelPlan.GetData.GetActivity.GetShortName], pamatuješ?\"#! Ale nikdy se to neuchytí.\n\nA teď ten starý blázen zabloudil a nikde ho není." # todo: NEW TRANSLATION
  travel_danger_events.9050.caravan_master: "Můj velitel karavany [travel_leader.GetFirstNameNoTooltip] najde [victim.GetHerHim]." # todo: NEW TRANSLATION
  travel_danger_events.9050.a: "[victim.GetFirstNameNoTooltip] je ztracen, musíme jít." # todo: NEW TRANSLATION
  travel_danger_events.9050.b: "Zastavte! Musíme hledat [victim.GetFirstNameNoTooltip]." # todo: NEW TRANSLATION
  death_lost: "odešel a už nikdy nebyl spatřen" # todo: NEW TRANSLATION
  9050_lost: "[victim.GetFirstName] je navždy ztracen" # todo: NEW TRANSLATION
  9050_found: "[victim.GetFirstName] je otřesený, ale nalezen" # todo: NEW TRANSLATION
  travel_danger_events.9060.t: "$travel_danger_prefix$ Křehký cestující" # todo: NEW TRANSLATION
  travel_danger_events.9060.desc: ""Au, au! Prosím, zastavte povoz — prosím vás!" můj [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))] [victim.GetFirstName] křičí na kočího. "Můj [elder_trait.GetName(GetNullCharacter)] už nevydrží hrboly, kameny a otřesy!"\n\nHrubé silnice v [location.GetName] ničí [victim.GetHerHis] křehké tělo.\n\nMožná bychom měli tempo trochu zpomalit." # todo: NEW TRANSLATION
  travel_danger_events.9060.sadistic: "#EMP ...musíme jet rychleji.#!" # todo: NEW TRANSLATION
  travel_danger_events.9060.a: "Nezastavujeme." # todo: NEW TRANSLATION
  travel_danger_events.9060.b: "Musíme zvážit pohodlí [victim.GetFirstNamePossessiveNoTooltip]." # todo: NEW TRANSLATION
  traveling_slowly_modifier: "Velmi pomalé cestování" # todo: NEW TRANSLATION
  traveling_slowly_modifier_desc: "Tento doprovod cestuje velmi pomalu, což je činí snadným terčem pro bandity." # todo: NEW TRANSLATION
  9060_wounded: "[victim.GetFirstName] je zraněn" # todo: NEW TRANSLATION
