l_polish:
  travel_events.5100.t: "Most [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')|U]" # todo: NEW TRANSLATION
  travel_events.5100.desc: "“Můj pane! Ten most má špatnou pověst. Pod ním žije [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]!” Můj [ROOT.Char.Custom2('RelationToMe', superstitious_traveler)] [superstitious_traveler.GetTitledFirstName] vykřikne. “Jistě na nás zaútočí, nebo nás z dálky prokleje, až projdeme.”\n\nČlenové mého doprovodu začnou mezi sebou šeptat. Někteří vzývají jméno [ROOT.Char.GetFaith.HighGodName] pro ochranu. Bohužel je most jediné bezpečné místo k přechodu na míle daleko." # todo: NEW TRANSLATION
  travel_events.5100.a: ""Nebojím se žádného [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')] ani démona!"" # todo: NEW TRANSLATION
  travel_events.5100.b: ""Nic takového neexistuje, [superstitious_traveler.GetTitledFirstNameNoTooltip]."" # todo: NEW TRANSLATION
  travel_events.5100.c: ""Musíme se modlit, abychom tohoto ducha vyhnali."" # todo: NEW TRANSLATION
  travel_events.5100.d: ""Strašidelné! Najděme jinou cestu."" # todo: NEW TRANSLATION
  custom.every_brave_or_impatient_entourage_member: "Každý člen doprovodu, který má [GetTrait('brave').GetName( GetNullCharacter )] nebo [GetTrait('impatient').GetName( GetNullCharacter )]" # todo: NEW TRANSLATION
  custom.every_cynical_or_impatient_entourage_member: "Každý člen doprovodu, který má [GetTrait('cynical').GetName( GetNullCharacter )] nebo [GetTrait('impatient').GetName( GetNullCharacter )]" # todo: NEW TRANSLATION
  custom.every_eccentric_or_zealous_entourage_member: "Každý člen doprovodu, který má [GetTrait('eccentric').GetName( GetNullCharacter )] nebo [GetTrait('zealous').GetName( GetNullCharacter )]" # todo: NEW TRANSLATION
