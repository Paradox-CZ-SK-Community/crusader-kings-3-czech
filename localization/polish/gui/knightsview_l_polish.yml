  KNIGHTS_SUBHEADER_LANDLESS_ADVENTURER: "Vhodní [followers|El]"
  CREATE_ACCOLADE_FORBID_TT: "#T Zakázat [CreateAccoladeView.GetSelectedKnight.GetShortUIName] stát se $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] se #emphasis nikdy nesmí#! připojit k vašim [armies|E] jako $knight_culture_player_no_tooltip$. Tímto udržíte [CreateAccoladeView.GetSelectedKnight.GetHerHim] v bezpečí před smrtí v [battle|E]." # todo: NEW TRANSLATION
  CREATE_ACCOLADE_BY_PROWESS_TT: "#T Povolit [CreateAccoladeView.GetSelectedKnight.GetShortUIName] být $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] se může připojit k vašim [armies|E] jako $knight_culture_player_no_tooltip$, pokud je [CreateAccoladeView.GetSelectedKnight.GetHerHis] [prowess|E] jedním z nejvyšších v [realm|E]" # todo: NEW TRANSLATION
  CREATE_ACCOLADE_FORCE_TT: "#T Donutit [CreateAccoladeView.GetSelectedKnight.GetShortUIName] stát se $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] se #emphasis musí#! připojit k vašim [armies|E] jako $knight_culture_player_no_tooltip$, bez ohledu na [CreateAccoladeView.GetSelectedKnight.GetHerHis] [prowess|E]. [CreateAccoladeView.GetSelectedKnight.GetSheHe|U] může nahradit $knight_culture_player_no_tooltip$ s vyšší zdatností." # todo: NEW TRANSLATION
