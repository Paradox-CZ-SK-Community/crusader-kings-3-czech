  KNIGHT_RESTRICTIONS: "Platí další omezení" # todo: NEW TRANSLATION
  KNIGHT_RESTRICTIONS_TT: "#T Omezení pro rytíře#!\nPouze vaši přímí [vassals|e], [courtiers|e] nebo [followers|e] mohou sloužit jako [knights|e].\nVaše [culture|e] nebo [faith|e] určuje, jaká pohlaví mohou působit jako [knights|e].\n\nRytíř nemůže být:\n - Player, [child|e], [prisoner|e] nebo [GetTrait('incapable').GetName(GetPlayer.Self)]\n - členem [clergy|e] (pokud to [faith|e] nebo [culture|e] nedovolí)\n - [master_assassin|e] nebo [GetTrait('blind').GetName(GetPlayer.Self)] (pokud to [culture|e] nedovolí nebo nejsou [GetTrait('order_member').GetName(GetPlayer.Self)])\n - [diarch|e] nebo [ceremonial_liege|e]\n - [governor|e] [duchy|e] (nebo vyššího [title|e]) nebo [house_head|e] [noble_family|e]\n\nKulturní [traditions|e] a události mohou některá omezení zrušit" # todo: NEW TRANSLATION
