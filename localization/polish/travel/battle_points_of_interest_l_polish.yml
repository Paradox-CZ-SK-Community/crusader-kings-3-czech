  TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical: "#T $TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name$#!\n$TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc$\n\n"
  TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name: "[Province.Custom('BattlePoiNameHistorical')]"
  TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc: "[Province.Custom('BattlePoIDescriptionHistorical')]"
  travel_point_historical_name_visit_message: "[ROOT.Char.GetCurrentLocation.Custom('BattlePoiNameHistorical')]"
  BattlePoIHistoricalNameTours: "Bitva u Tours"
  BattlePoIHistoricalDescTours: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '131721' ).GetFirstNameNicknamed]\nPoražený: Abd al-Rahman al-Ghafiqi\nDatum: 10. října 732 n.l.#!\n#weak Bitva, při níž Karel Martel odrazil umajjovskou invazi do Francie u řek Clain a Vienne. Říká se, že Karlovi muži stáli nehybní jako zeď a stříhali do nabíhající umajjovské těžké jízdy. Poté, co dopadli na nepřátelského velitele a strhli ho ze sedla, jejich protivníci prchli z bojiště.#!"
  BattlePoIHistoricalNameLechfeld: "Bitva u Lechfeldu"
  BattlePoIHistoricalDescLechfeld: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '1282' ).GetTitledFirstName]\nPoražený: [GetScriptedCharacterByHistoryID( '460' ).GetFirstName] [GetScriptedCharacterByHistoryID( '460' ).GetDynastyName]\nDatum: 10. srpna 955 n.l.#!\n#weak Krvavá bitva mezi vojsky saského krále Otty a uherskými silami. Po devastujících ztrátách na obou stranách Uhři ustoupili, když se jim hrozilo obklíčení a tok bitvy se obrátil proti nim.\n\nPo skončení bitvy bylo mnoho uherských velitelů zajato a popraveno a trvající maďarská hrozba pro západní Evropu byla konečně zlomena.#!"
  BattlePoIHistoricalNameHastings: "Bitva u Hastingsu"
  BattlePoIHistoricalDescHastings: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '140' ).GetFirstName] [GetScriptedCharacterByHistoryID( '140' ).GetDynastyName]\nPoražený: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nDatum: 14. října 1066 n.l.#!\n#weak Bitva u Hastingsu byla jednou z klíčových bitev při vzestupu Viléma k moci v Anglii. Donuceni bojovat do kopce, normandští vojáci se obtížně probíjeli kupředu a dokonce se v určitém okamžiku začali stahovat, ale Vilém dokázal zorganizovat protiútok proti anglickým jednotkám.\n\nPřemožen Harold padl spolu se svými dvěma bratry [GetScriptedCharacterByHistoryID( '132' ).GetFirstNameNoTooltip] a [GetScriptedCharacterByHistoryID( '130' ).GetFirstNameNoTooltip], čímž anglický trůn zůstal neobsazen.#!"
  BattlePoIHistoricalNameStamfordBridge: "Bitva u Stamford Bridge"
  BattlePoIHistoricalDescStamfordBridge: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nPoražený: [GetScriptedCharacterByHistoryID( '102531' ).GetNameNicknamed]\nDatum: 25. září 1066 n.l.#!\n#weak Bitva u Stamford Bridge byla jedním z klíčových střetnutí mezi třemi uchazeči o anglický trůn: Vilémem z Normandie, Haraldem z Norska a Haroldu z Anglie. Harold se s muži hnul na sever a překvapil norská vojska, která nebyla připravena k boji.\n\nHarald byl zabit šípem do průdušnice a jeho anglický spojenec [GetScriptedCharacterByHistoryID( '124' ).GetFirstNameNoTooltip], Haroldův bratr, byl také zabit. Norská armáda byla po bitvě bez velitelů téměř zničena.#!"
  BattlePoIHistoricalNameManzikert: "Bitva u Manzikertu"
  BattlePoIHistoricalDescManzikert: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '3040' ).GetFirstName] [GetScriptedCharacterByHistoryID( '3040' ).GetDynastyName]\nPoražený: [GetScriptedCharacterByHistoryID( '1734' ).GetFullName]\nDatum: 26. srpna 1071 n.l.#!\n#weak Romanos, korunovaný císařem Byzantské říše v roce 1068, vedl tažení proti tureckým vpádům do Anatolie. Po omezených úspěších se pokusil dosáhnout rozhodujícího vítězství v bitvě proti Alp Arslanu z seldžucké říše u Manzikertu.\n\nZrazen jedním ze svých velitelů, který ustoupil s velkou částí armády, Romanos skončil v zajetí muslimských vojsk. Ač byl později propuštěn, byl svržen, očním zákrokem oslepen, vyhnán do exilu a zemřel na následky zranění.#!"
  BattlePoIHistoricalNameYarmuk: "Bitva u Yarmuku"
  BattlePoIHistoricalDescYarmuk: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '163015' ).GetFullName]\nPoražený: [GetScriptedCharacterByHistoryID( '145071' ).GetFullName]\nDatum: 20. srpna 636 n.l.#!\n#weak Bitva u Yarmuku je jednou z nejdůležitějších bitev byzantské historie. Rozhodující porážka vedla ke ztrátě Sýrie a Egypta a k velkému rozšíření arabského (muslimského) impéria.\n\nBitva trvala šest dní; původní průběh se nejprve přiklonil proti muslimským útočníkům, ale pátý den přešli z obranné do ofenzivní strategie. Šestého dne nasadili odvážnou jízdu, která zlomila byzantskou armádu.\n\nZlomené morálky se byzantští vojáci hroutili do kaňonů, topili se nebo byli dohoněni a pobiti, když prchali z bojiště.#!"
  BattlePoIHistoricalNameDandanaqan: "Bitva u Dandanaqanu"
  BattlePoIHistoricalDescDandanaqan: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '3036' ).GetFullName]\nPoražený: [GetScriptedCharacterByHistoryID( '144129' ).GetFullName]\nDatum: 23. května 1040 n.l.#!\n#weak Důležitá bitva mezi rostoucí seldžuckou mocí v severní Persii a Ghaznavidskou říší. Po úspěších proti seldžuckým silám v počátečních střetnutích začali Ghaznavidové pospolitě hádat o kořist.\n\nZmateni a nepřipraveni k boji byli překvapeni návratem seldžuckých sil. Pronásledovaní, hladovějící a demoralizovaní, ghaznavidské vojsko bylo svými protivníky rozprášeno.#!"
  BattlePoIHistoricalNameAror: "Bitva u Aroru"
  BattlePoIHistoricalDescAror: "#emp Vítěz: Muhammad ibn al-Qasim\nPoražený: Raja Dahir\nDatum: 711 n.l.#!\n#weak Bitva při umajjovské invazi do Indie, mezi radžou Sinhdu a Umajjovskou říší.\n\nAčkoliv jejich protivníci měli původně početní převahu, umajjovský velitel si dokázal zajistit lepší postavení před rozhodujícím střetem. Během konfliktu mu to postupně umožnilo převzít iniciativu a s smrtí radži Dahira bylo vítězství zajištěno.#!"
  BattlePoIHistoricalNameSvolder: "Bitva u Svolderu"
  BattlePoIHistoricalDescSvolder: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '101505' ).GetFullName]\nPoražený: [GetScriptedCharacterByHistoryID( '144004' ).GetFullName]\nDatum: 9. září 999 n.l.#!\n#weak Bitva mezi norskými silami Olafa Tryggvasona na jedné straně a koalicí dánských a švédských sil vedených králem Sveinnem z Dánska na straně druhé.\n\nI přes značnou přesilu norský král odmítl ustoupit před nepřátelskou koalicí a pustil se do boje se Švédy a Dány, přičemž je urážel jako 'jídelníky koní' a 'lesní kozy'.\n\nNakonec, přestože ponesl těžké rány svému protivníkovi, byla norská armáda poražena. Olaf v bitvě zmizel a pravděpodobně zahynul.#!"
  BattlePoIHistoricalNameCivitate: "Bitva u Civitate"
  BattlePoIHistoricalDescCivitate: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '1126' ).GetFullName]\nPoražený: [GetScriptedCharacterByHistoryID( '1338' ).GetFullName]\nDatum: 18. června 1053 n.l.#!\n#weak Bitva mezi Normany na jedné straně a koalicí vedenou papežem na straně druhé, včetně německých a místních italských sil.\n\nI přes početní převahu papežská koalice nedokázala prorazit normanská centra pěchoty a jejich jízdní křídla prohrála s normanskou jízdou.\n\nKrátce po bitvě byl papež zajat Normany, což vedlo k ukončení konfliktu.#!"
  BattlePoIHistoricalNameTalas: "Bitva u Talasu"
  BattlePoIHistoricalDescTalas: "#emp Vítěz: Abbásovský chalífát\nPoražený: dynastie Tang\nDatum: 751 n.l.#!\n#weak Dlouhotrvající střet mezi Abbásovským chalífátem expandujícím do Transoxanie od jihozápadu a dynastií Tang expandující z východu.\n\nPůvodně sehrála důležitou roli těžká pěchota Tang a jejich tюркští žoldnéři při odražení Abbásovských sil, ale když žoldnéři přešli na druhou stranu a mnozí jejich spojenci je zradili, byli Tangové zatlačeni.\n\nTento konflikt ukončil západní expanzi dynastie Tang a Transoxiana byla na dlouhou dobu v rukou muslimských vládců.#!"
  BattlePoIHistoricalNameSufuku: "Bitva u Subushi" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescSufuku: "#emp Vítěz: The Emishi of Isawa\nDefeated: [GetScriptedCharacterByHistoryID( 'japanese_iruma_1' ).GetFullName]\nDate: 789 n. l.#!\n#weak Důležitá bitva v rámci japonského podrobení Emishi.\n\nJaponské síly se zpočátku rozdělily na dvě části a postupovaly po obou stranách řeky Kitakami za ustupujícími Emishi. Emishiští lehkooděnci zabránili Japoncům překročit řeku, čímž velkou část z nich sevřeli mezi řeku a hory.\n\nNásledující kolaps japonských jednotek byl velkým trapasem; mnoho vojáků plavalo přes řeku nazí, aby unikli smrti. Armáda byla rozpuštěna a [GetScriptedCharacterByHistoryID( 'japanese_yamato_24' ).GetFullName] své velitele ostře pokáral.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameBaekgang: "Bitva u Baekgangu" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescBaekgang: "#emp Vítěz: Království Silla & Tangská Čína\nDefeated: [GetScriptedCharacterByHistoryID( 'japanese_abe_36' ).GetFullName]\nDate: 663 n. l.#!\n#weak Rozhodující námořní bitva, v níž Tangská Čína a Silla střetly síly obnoveného Baekje a jejich japonských spojenců.\n\nBitva se odehrávala převážně na řece Baengma. Ačkoliv japonské síly měly početní převahu, tangské loďstvo vydrželo a nakonec zaútočilo, obklíčilo a porazilo japonskou flotilu.\n\nRozhodné vítězství Silla–Tang donutilo Japonsko zcela ustoupit z korejských záležitostí a rozdrtilo hnutí za obnovu Baekje.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNamePalembang: "Útok Čola na Palembang" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescPalembang: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '189038' ).GetFullName]\nDefeated: [GetScriptedCharacterByHistoryID( 'javanese_sailendra_25' ).GetFullName]\nDate: 1025 n. l.#!\n#weak Náhlý útok čolských sil na hlavní město Srivijaya v Palembangu.\n\nČolské jednotky připluly přes moře a rychle podrobily hlavní město Srivijaya, které při tom vyplenily a zničily.\n\nPád Palembangu vedl k úplnému zhroucení říše Srivijaya a čolský vliv v oblasti přetrval ještě desetiletí.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameAngkor: "Obléhání Angkoru" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescAngkor: "#emp Vítěz: [GetScriptedCharacterByHistoryID( 'cham_panduranga_04' ).GetFullName]\nDefeated: [GetScriptedCharacterByHistoryID( 'khmer_tribhuvanaditya_01' ).GetFullName]\nDate: 1177 n. l.#!\n#weak Období občanských sporů a převratů v říši Kambuja vedlo k tomu, že k moci vystoupil Tribhuvanaditya, nehájící královský původ. Zatímco bojoval s královskými povstalci podporujícími jiné nároky, království Champa vpadlo do Kambuje.\n\nSíly Champy postupovaly po Mekongu a Tonle Sapu, vyplenily samotné hlavní město Angkor a zabily Tribhuvanadityu.\n\nPo obléhání říše Kambuja zkolabovala a kořist byla rozprášena v oblasti nebo odvezena Cham.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameSongping: "Obléhání Songpingu" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescSongping: "#emp Vítěz: Yang Sijin\nDefeated: Cai Xi\nDate: 863 n. l.#!\n#weak Nepokoje v tangském protektorátu Annan přiměly sousední království Nanzhao, aby se spojilo s místními kmeny a vpadlo do oblasti s drtivou silou.\n\nArmáda Nanzhao a její spojenci město nějakou dobu obléhali, než pronikli do vnitřního města; obránci učinili poslední stánek u východní brány, kde přepadli nepřátelskou jízdu a mnoho z nich pobili, než byli poraženi.\n\nAčkoliv je vietské obyvatelstvo zpočátku vítalo, síly Nanzhao oblast vyplenily a tangská protiofenziva v roce 864 nakonec celé území znovu dobyla.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameMuye: "Bitva u Muye" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescMuye: "#emp Vítěz: Král Wu\nDefeated: Císař Zhou ze Šang\nDate: 1046 př. n. l.#!\n#weak Bitva u Muye se odehrála mezi povstaleckým králem Wu a šangským císařem Zhouem.\n\nWuovy síly byly zpočátku početně slabší, ale šangské jednotky, z velké části vojenské otroky, se ukázaly být nespolehlivé a utekly z bojiště. Výsledkem bylo velmi krvavé vítězství povstalců vedených králem Wu.\n\nBitva vedla k pádu dynastie Šang a král Wu si přisvojil Mandát nebes, čímž založil novou dynastii Zhou.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameRedCliffs: "Bitva u Rudých útesů" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescRedCliffs: "#emp Vítěz: Sun Quan\nDefeated: Cao Cao\nDate: 208 n. l.#!\n#weak Bitva u Rudých útesů byla říční bitva mezi koalicí válčících pánů a severním vládcem Cao Caem v období kolem konce dynastie Chan. Cao Cao se snažil vytvořit předmostí přes řeku Jang-c'-ťiang do jižní Číny.\n\nSpojenci předstíráním kapitulace dokázali přilákat CaoCaovy lodě do pasti, zapálit je a upálit tak mnoho vojáků i koní zaživa. Severní armáda se pak ocitla v chaosu a byla poražena.\n\nPorážka zabránila Cao Caovi postoupit za řeku Jang-c'-ťiang a připravila půdu pro nadcházející období Tří království.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameGuandu: "Bitva u Guandu" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescGuandu: "#emp Vítěz: Cao Cao\nDefeated: Yuan Shao\nDate: 200 n. l.#!\n#weak Bitva u Guandu byla střetem mezi pány Cao Caem a Yuan Shao na sklonku východní dynastie Han; oba měli značnou moc a navzájem představovali hlavní překážku při ovládnutí Číny.\n\nCaoCaovy síly byly v bitvě početně slabší, ale použily taktiky, jako byl překvapivý nájezd na zásobovací sklad Yuan Shaa, čímž protivníkovu armádu paralyzovaly.\n\nBitva byla zlomovým bodem období; Cao Cao z ní vyšel vítězně a otevřel cestu pro budoucí stát Cao Wei v období Tří království.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameYiling: "Bitva u Yilingu" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescYiling: "#emp Vítěz: Lu Xun - Východní Wu\nDefeated: Liu Bei - Šu Han\nDate: 221 n. l.#!\n#weak Liu Bei, snažící se znovu získat ztracená území v provincii Jing, osobně vedl své armády proti Východnímu Wu a dosáhl počátečních úspěchů.\n\nBěhem bitvy byly Liu Beiovy síly navedeny do pasti generálem Lu Xunem, který zapálil tábor Šu Han, což přimělo Liu Beie k ústupu. Nakonec Liu Bei osobně opustil bojiště tím, že nařídil svým mužům zapálit svá brnění, čímž vytvořili ohnivou bariéru proti útočníkům.\n\nBitva znamenala rozhodující porážku Liu Beiho, ukončila jeho kampaň a následně vedla i k jeho smrti.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameFeiRiver: "Bitva u řeky Fei" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescFeiRiver: "#emp Vítěz: Xie An - Jin\nDefeated: Fu Jian - bývalý stát Qin\nDate: 383 n. l.#!\n#weak Bitva byla vyvrcholením delší kampaně, kdy bývalý stát Qin, sjednotiv řadu různých cizích kmenů, ovládl značné části území Jinu. Qinské armády byly číslem mnohem silnější než Jin, kteří se postavili na obranu u řeky Fei.\n\nBěhem bitvy disciplinované a dobře vycvičené jednotky Jinu rozprášily mnohem početnější, ale neorganizované a demotivované síly pozdního Qinu.\n\nPorážka Qinských sil Jin s minimálními ztrátami výrazně pozměnila rovnováhu sil a zajistila, že jižní Čína zůstala nezávislá ještě více než sto let.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameCanheSlope: "Bitva na Canheho svahu" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescCanheSlope: "#emp Vítěz: Touba Gui - Severní Wei\nDefeated: Murong Bao - Pozdní Yan\nDate: 395 n. l.#!\n#weak Bitva vznikla v důsledku trestné expedice Pozdní Yan proti dynastii Severní Wei.\n\nKdyž síly Pozdní Yan dorazily na svah Canhe, zaskočila je bouře a v té chvíli na ně zaútočili nepřátelé. Armáda Pozdní Yan byla přepadena a mnozí uprchli přímo do Žluté řeky.\n\nBitva nakonec obrátila poměry sil v regionu ve prospěch Severní Wei, které převzalo většinu území Pozdní Yan.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameXiangji: "Bitva u chrámu Xiangji" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescXiangji: "#emp Vítěz: [GetScriptedCharacterByHistoryID( 'han_1528' ).GetFullName]\nDefeated: [GetScriptedCharacterByHistoryID( 'an_qingxu' ).GetFullName]\nDate: 757 n. l.#!\n#weak Tato bitva byla vyvrcholením tangské protiofenzivy proti povstaleckým silám, které ovládly většinu severní Číny, a byla jednou z nejkrvavějších bitev při povstání An Lu-šana. Obrovská vojska se střetla severně od Chang'anu u chrámu Xiangji.\n\nKe dni se tangská armáda zmocnila vyššího terénu, zatímco armáda Yan byla postavena před samotný Chang'an. Po několika manévrech se bitva proměnila ve vleklé patové postavení, kdy disciplinované jednotky bez ustupování proti sobě bojovaly, až nakonec fronta Yan zkolabovala v důsledku obrovských ztrát.\n\nBrutalita střetu obě armády značně decimovala, ale zlomila páteř povstání. Tangské síly byly schopny následující den Chang'an opět dobýt.#!" # todo: NEW TRANSLATION
  BattlePoIHistoricalNameGaoliang: "Bitva u řeky Gaoliang" # todo: NEW TRANSLATION
  BattlePoIHistoricalDescGaoliang: "#emp Vítěz: [GetScriptedCharacterByHistoryID( '194330' ).GetFullName]\nDefeated: [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullName]\nDate: 979 n. l.#!\n#weak Bitva následovala po pokusu Sungů získat zpět 16 prefektur, které dynastie Liao dobyla v roce 960, a osobně ji vedl císařův vlastní bratr (budoucí císař [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip]).\n\nMěsto Youzhou bylo obléháno tři měsíce, než dorazila liaoská posila a ulevila obráncům; ačkoliv Songové byli zpočátku úspěšní, jejich armáda byla v noci zaskočena útokem ze tří směrů.\n\nBitva skončila tím, že [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip] utekl z místa události v oslí káře. Toto byla první velká porážka Sungů po jejich vzestupu k moci.#!" # todo: NEW TRANSLATION
